async function generateRecipeForMeal(){
  const meal=ui.cookingModal.meal;
  ui.cookingModal.generating=true;
  ui.cookingModal.error='';
  renderCookingModal();
  const inventory=state.inventory.map(i=>i.name+(i.quantity?' ('+i.quantity+(i.unit?' '+h(i.unit):'')+')':'')).join(', ');
  const system='You are a recipe generator. Given a meal name and the user\'s kitchen inventory, generate a practical recipe using as many of their available ingredients as possible. Respond ONLY with a raw JSON object (no markdown, no code fences): {"title":string,"cuisine":string,"mealType":string,"totalTimeMinutes":number,"servings":number,"description":string,"spiceLevel":string,"ingredients":[{"name":string,"quantity":string,"have":boolean}],"steps":[string],"missingIngredients":[string],"tags":[string]}. Mark have:true if the ingredient fuzzy-matches the inventory. Assume salt, pepper, oil, and water are always available. Keep steps to 4-6 clear imperative sentences.';
  try{
    const data=await api('POST','generate-recipe',{max_tokens:1500,system,messages:[{role:'user',content:'Generate a recipe for: "'+meal+'"\n\nKitchen inventory: '+inventory}]});
    if(!data) throw new Error('request failed');
    let text=(data.content||[]).find(b=>b.type==='text')?.text||'';
    text=text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const recipe=JSON.parse(text);
    if(!recipe.title) throw new Error('empty');
    ui.cookingModal.generatedRecipe={...recipe,id:uid(),dateAdded:new Date().toISOString(),usesLowStock:[]};
    ui.cookingModal.generating=false;
    noteCreditSpent();
  }catch(e){
    console.error(e);
    ui.cookingModal.generating=false;
    ui.cookingModal.error=lastApiStatus===402?'You\'re out of AI credits. Buy more in Settings → Family & Billing.':'Couldn\'t generate a recipe right now. Try again.';
  }
  renderCookingModal();
}


const SLOT_EMOJI={'Breakfast':'🌅','Lunch':'🍳','Dinner':'🌙','Snack':'🍿','Dessert':'🍰'};

async function generateRandomRecipes(){
  ui.generatingRandom=true;
  ui.generateError='';
  // Full render FIRST so the button shows disabled + loading state immediately,
  // regardless of which tab is currently showing
  render();

  const existing=state.cookbook.slice(0,40).map(r=>r.title).join(', ');
  const system='You are a creative recipe generator for a home kitchen app. Generate exactly 6 diverse and practical recipes. Mix different cuisines, meal types, and difficulty levels. Avoid duplicating any of these existing recipes: '+existing+'. Respond ONLY with a raw JSON array of 6 recipe objects (no markdown, no fences): [{"title":string,"cuisine":string,"mealType":string,"totalTimeMinutes":number,"servings":number,"description":string,"spiceLevel":string,"ingredients":[{"name":string,"quantity":string,"have":false}],"steps":[string],"missingIngredients":[],"tags":[string]}]. Keep descriptions under 15 words. Keep steps to 4-6 imperative sentences each under 15 words. Include at least one Breakfast, one Lunch, and one Dinner recipe.';
  try{
    const data=await api('POST','generate-recipe',{max_tokens:4000,system,
      messages:[{role:'user',content:'Generate 6 diverse home recipes I haven\'t tried yet.'}]});
    if(!data) throw new Error('request failed');
    let text=(data.content||[]).find(b=>b.type==='text')?.text||'';
    text=text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const s=text.indexOf('['),e=text.lastIndexOf(']');
    if(s>-1&&e>-1) text=text.slice(s,e+1);
    const recipes=JSON.parse(text);
    if(!Array.isArray(recipes)||!recipes.length) throw new Error('empty response');
    let added=0;
    recipes.forEach(r=>{
      if(!r.title) return;
      const dup=state.cookbook.some(cb=>cb.title.toLowerCase()===r.title.toLowerCase());
      if(!dup){ state.cookbook.push({...r,id:uid(),dateAdded:new Date().toISOString(),usesLowStock:[]}); added++; }
    });
    saveCookbook();
    ui.generatingRandom=false;
    noteCreditSpent();
  }catch(err){
    console.error('generateRandomRecipes error:', err);
    ui.generatingRandom=false;
    ui.generateError=lastApiStatus===402?'You\'re out of AI credits. Buy more in Settings → Family & Billing.':'Couldn\'t generate recipes right now. Please try again.';
  }
  render();
}

function renderRecipeBrowserListInner(){

function renderPlanner(){
  const ws=getWeekStart(ui.plannerWeekOffset);
  const we=new Date(ws);we.setDate(we.getDate()+6);
  const label=ws.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' – '+we.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  const today=new Date();today.setHours(0,0,0,0);
  const hasAny=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return state.planner[dateKey(d)];}).some(Boolean);

  const days=Array.from({length:7},(_,i)=>{
    const d=new Date(ws);d.setDate(d.getDate()+i);
    const key=dateKey(d);
    const isToday=d.getTime()===today.getTime();
    const dayData=state.planner[key]||{};
    const dayLabel=d.toLocaleDateString(undefined,{weekday:'long'});
    const dateStr=d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
    const slots=MEAL_SLOTS.map(slot=>{
      const meals=slotMeals(dayData,slot);
      const emoji=SLOT_EMOJI[slot]||'';
      if(!meals.length){
        return '<button type="button" class="planner-slot" data-action="open-planner-modal" data-date="'+key+'" data-slot="'+h(slot)+'">'+
          '<div class="slot-label">'+emoji+' '+slot+'</div>'+
          '<div class="slot-add-btn">＋ Add</div>'+
        '</button>';
      }
      const rows=meals.map(meal=>{
        // Show a green dot if all ingredients are in kitchen
        const cbEntry=state.cookbook.find(r=>r.title.toLowerCase()===meal.toLowerCase());
        const avail=cbEntry?recipeAvailability(cbEntry):null;
        const dot=avail&&avail.missing===0?'<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;flex-shrink:0;"></span>':'';
        return '<button type="button" class="slot-meal-row" data-action="open-cooking-mode" data-date="'+key+'" data-slot="'+h(slot)+'" data-meal="'+h(meal)+'">'+dot+h(meal)+'</button>';
      }).join('');
      return '<div class="planner-slot planner-slot-filled">'+
        '<div class="slot-label">'+emoji+' '+slot+'</div>'+
        rows+
        '<button type="button" class="slot-add-more-btn" data-action="open-planner-modal" data-date="'+key+'" data-slot="'+h(slot)+'">＋ Add another</button>'+
      '</div>';
    }).join('');
    return '<div class="planner-day">'+
      '<div class="planner-day-header">'+
        '<span class="day-label">'+dayLabel+'</span>'+
        '<span class="day-date">'+dateStr+'</span>'+
        (isToday?'<span class="today-chip">TODAY</span>':'')+
      '</div>'+
      '<div class="planner-slots">'+slots+'</div>'+
    '</div>';
  }).join('');

  // Recipe Browser section
  const mealPills=['All','Breakfast','Lunch','Dinner','Snack','Dessert'].map(m=>
    '<button class="pill-btn '+(ui.browserMealFilter===m?'active':'')+'" data-action="set-browser-meal" data-val="'+m+'">'+m+'</button>').join('');

  const browser='<div class="recipe-browser-section">'+
    '<div class="recipe-browser-header">'+
      '<h3>📖 Recipe Browser</h3>'+
      '<button class="btn btn-secondary" data-action="toggle-browser-add-form" style="font-size:12px;padding:7px 13px;">+ Add recipe</button>'+
      '<button class="btn btn-primary" data-action="generate-random-recipes" '+(ui.generatingRandom?'disabled':'')+' style="font-size:12px;padding:7px 13px;display:flex;align-items:center;gap:5px;">'+
        (ui.generatingRandom?'<span class="spinner" style="width:14px;height:14px;border-width:2px;margin:0;"></span> Generating…':'✦ Generate recipes')+
      '</button>'+
      '<div class="search-box" style="max-width:240px;"><span class="search-icon">🔍</span>'+
        '<input id="browser-search-input" data-live="browser-search" value="'+h(ui.browserSearch)+'" placeholder="Search recipes…">'+
      '</div>'+
    '</div>'+
    '<div class="pill-filters" style="margin-bottom:14px;">'+mealPills+'</div>'+
    (ui.browserShowAddForm?'<div style="margin-bottom:14px;">'+renderAddCookbookForm()+'</div>':'')+
    '<div id="recipe-browser-list">'+renderRecipeBrowserList()+'</div>'+
  '</div>';

  return '<div class="planner-header">'+
    '<button class="planner-nav" data-action="planner-prev">‹</button>'+
    '<div class="planner-title"><h2>'+label+'</h2><p>Tap any slot to add a meal</p></div>'+
    '<button class="planner-nav" data-action="planner-next">›</button>'+
  '</div>'+
  (hasAny?'<div style="text-align:center;margin-bottom:16px;"><button class="btn btn-secondary" data-action="add-week-missing">🛒 Add week\'s missing to grocery</button></div>':'')+
  '<div class="planner-grid">'+days+'</div>'+
  browser;
}

function applyAccentColor(color){
  const root=document.documentElement.style;
  if(!color){ root.removeProperty('--green'); root.removeProperty('--green-soft'); return; }
  root.setProperty('--green',color);
  // Lighten the accent ~80% toward white for the "soft" badge/background variant
  const n=parseInt(color.slice(1),16);
  const r=Math.round(((n>>16)&255)+(255-((n>>16)&255))*0.8);
  const g=Math.round(((n>>8)&255)+(255-((n>>8)&255))*0.8);
  const b=Math.round((n&255)+(255-(n&255))*0.8);
  root.setProperty('--green-soft','rgb('+r+','+g+','+b+')');
}

// ─── API: FIND RECIPES ────────────────────────────────────────────────────
async function findRecipes(){
  ui.recipeStatus='loading';ui.recipeError='';render();
  const f=ui.cookFilters;
  const cuisine=f.cuisine==='Other'?(f.customCuisine||'Any'):f.cuisine;
  const customCuisineEl=document.getElementById('cook-custom-cuisine');
  const notesEl=document.getElementById('cook-notes');
  const actualCuisine=cuisine==='Other'&&customCuisineEl?customCuisineEl.value:cuisine;
  const actualNotes=notesEl?notesEl.value:f.notes;
  const payload={
    inventory:state.inventory.map(i=>({name:i.name,quantity:i.quantity,unit:i.unit,location:i.location,low:isLow(i)})),
    groceryList:state.grocery.filter(g=>!g.checked).map(g=>g.name),
    mealType:f.mealType,cuisine:actualCuisine,
    maxTotalTimeMinutes:f.maxTime==='any'?null:Number(f.maxTime),
    preferUseWhatIHave:!!f.preferHave,extraNotes:actualNotes
  };
  const system='You are the recipe engine inside a home kitchen app called PantryPal. Respond ONLY with a raw JSON array — no markdown fences, no commentary — of exactly 3 recipe objects: [{"title":string,"cuisine":string,"mealType":string,"prepTimeMinutes":number,"cookTimeMinutes":number,"totalTimeMinutes":number,"servings":number,"ingredients":[{"name":string,"quantity":string,"have":boolean}],"missingIngredients":[string],"steps":[string],"usesLowStock":[string],"tags":[string]}]. Mark ingredient have:true if it loosely matches the inventory (plurals, synonyms OK). Assume salt, pepper, oil, water always available. Honor mealType/cuisine/maxTotalTimeMinutes as hard filters when not Any/null. If preferUseWhatIHave, strongly favor recipes with few missing ingredients, especially using low-stock items. Keep steps to 4-6 imperative sentences each under 15 words. Respond with strict JSON only.';
  try{
    const data=await api('POST','generate-recipe',{max_tokens:2500,system,messages:[{role:'user',content:JSON.stringify(payload)}]});
    if(!data) throw new Error('request failed');
    let text=(data.content||[]).find(b=>b.type==='text')?.text||'';
    text=text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const s=text.indexOf('[');const e=text.lastIndexOf(']');
    if(s>-1&&e>-1) text=text.slice(s,e+1);
    const recipes=JSON.parse(text);
    if(!Array.isArray(recipes)||!recipes.length) throw new Error('empty');
    ui.recipes=recipes;ui.recipeStatus='done';
    noteCreditSpent();
  }catch(err){
    console.error(err);ui.recipeStatus='error';
    ui.recipeError=lastApiStatus===402?'You\'re out of AI credits. Buy more in Settings → Family & Billing.':'Could not fetch recipes. Check your filters and try again.';
  }
  render();
}

function partialUpdate(id,html){const el=document.getElementById(id);if(el)el.innerHTML=html;}

document.addEventListener('click',e=>{
  // Close modals when clicking the overlay backgrounds
  if(e.target.id==='pp-modal-overlay'){
    ui.plannerModal=null;ui.plannerSearch='';ui.plannerShowCreate=false;
    ui.recipeViewModal=null;ui.assignModal=null;
    ui.showAddItem=false;ui.editingItemId=null;
    renderModal();return;
  }
  if(e.target.id==='pp-cooking-overlay'){
    ui.cookingModal=null;renderCookingModal();return;
  }
  const el=e.target.closest('[data-action]');if(!el)return;
  const a=el.dataset;
  switch(a.action){
    // nav
    case 'set-tab': ui.tab=a.tab; if(a.tab==='cook'&&ui.recipeStatus==='idle') ui.tab='cook'; render(); break;
    // kitchen
    case 'open-add-item': ui.showAddItem=true;ui.editingItemId=null;render();break;
    case 'cancel-add-item': ui.showAddItem=false;ui.editingItemId=null;render();break;
    case 'edit-item':{const item=state.inventory.find(i=>i.id===a.id);if(item){ui.editingItemId=a.id;ui.showAddItem=true;render();}}break;
    case 'delete-item': if(confirm('Remove '+( state.inventory.find(i=>i.id===a.id)?.name||'this item')+'?')){deleteItem(a.id);}break;
    case 'adj-qty': adjustQty(a.id,Number(a.delta));break;
    case 'quick-add-grocery':{const item=state.inventory.find(i=>i.id===a.id);if(item){addGroceryItem(item.name,item.category,'',true);saveGrocery();render();}}break;
    case 'reset-kitchen-filters': ui.kitchenLoc='All';ui.kitchenExpiry='all';render();break;
    case 'set-kitchen-loc': ui.kitchenLoc=a.val;ui.kitchenExpiry='all';render();break;
    case 'set-kitchen-expiry': ui.kitchenExpiry=a.val;ui.kitchenLoc='All';render();break;
    // grocery
    case 'toggle-checked': toggleChecked(a.id);break;
    case 'delete-grocery': deleteGrocery(a.id);break;
    case 'clear-checked': clearChecked();break;
    case 'add-all-low-stock': addAllLowStock();break;
    case 'quick-add-grocery-form':{
      const qInput=document.getElementById('grocery-quick-input');
      const qQty=document.getElementById('grocery-quick-qty');
      const qStore=document.getElementById('grocery-quick-store');
      const name=(qInput?.value||'').trim();
      if(name){addGroceryItem(name,ui.groceryQuickCat,'',false,qQty?.value||'',qStore?.value||'');saveGrocery();
        if(qInput)qInput.value='';if(qQty)qQty.value='';if(qStore)qStore.value='';
        ui.groceryQuickCat='Other';ui.groceryQuickCatBg='#E2DCCB';ui.groceryQuickCatColor='#6B7160';ui.groceryQuickEmoji='📦';
        render();}
    }break;
    case 'close-add-grocery': ui.showAddGrocery=false;render();break;
    case 'set-grocery-group': ui.groceryGroup=a.val;render();break;
    case 'toggle-show-checked': ui.showChecked=!ui.showChecked;render();break;
    case 'toggle-group': toggleGroup(a.group);break;
    case 'goto-grocery-store': ui.groceryGroup='store';ui.groceryStore=a.store==='__none__'?'':(a.store||'All');ui.tab='grocery';render();break;
    case 'share-grocery':{
      const text=state.grocery.filter(g=>!g.checked).map(g=>(g.quantity?g.quantity+' ':'')+g.name+(g.store?' ('+g.store+')':'')).join('\n');
      navigator.share({title:'Grocery List',text}).catch(()=>{});
    }break;
    case 'copy-grocery':{
      const text=state.grocery.filter(g=>!g.checked).map(g=>(g.quantity?g.quantity+' ':'')+g.name+(g.store?' ('+g.store+')':'')).join('\n');
      navigator.clipboard.writeText(text).then(()=>alert('Copied to clipboard!')).catch(()=>{});
    }break;
    // cook
    case 'find-recipes': findRecipes();break;
    case 'use-what-i-have': ui.cookFilters.mealType='Any';ui.cookFilters.cuisine='Any';ui.cookFilters.maxTime='any';ui.cookFilters.preferHave=true;findRecipes();break;
    case 'add-missing-grocery': addMissingToGrocery(Number(a.idx));break;
    case 'save-recipe':{const r=ui.recipes[Number(a.idx)];if(r){saveRecipe(r);render();}}break;
    // cookbook
    case 'open-add-cookbook': ui.showAddCookbook=true;render();break;
    case 'close-add-cookbook': ui.showAddCookbook=false;render();break;
    case 'delete-cookbook': if(confirm('Remove this recipe?')){deleteCookbookItem(a.id);}break;
    case 'set-cb-meal': ui.cbMealFilter=a.val;render();break;
    case 'toggle-cb-can-make': ui.cbCanMake=!ui.cbCanMake;render();break;
    case 'toggle-cb-fav': ui.cbFav=!ui.cbFav;render();break;
    case 'toggle-cb-fav-item':{const r=state.cookbook.find(x=>x.id===a.id);if(r){r.favorite=!r.favorite;saveCookbook();render();}}break;
    case 'add-cookbook-missing': addCookbookMissingToGrocery(a.id);break;
    // recipe view modal (used from the cookbook and the planner's recipe browser)
    case 'open-recipe-view':{
      const r=state.cookbook.find(x=>x.id===a.id);
      if(r){ ui.assignModal=null; ui.recipeViewModal={recipe:r,large:false}; renderModal(); }
    }break;
    case 'close-recipe-view': ui.recipeViewModal=null; renderModal(); break;
    case 'toggle-recipe-view-size': if(ui.recipeViewModal){ ui.recipeViewModal.large=!ui.recipeViewModal.large; renderModal(); } break;
    // assign-to-planner modal (used from the cookbook and the planner's recipe browser)
    case 'open-assign-modal': ui.recipeViewModal=null; ui.assignModal={title:a.title,weekOffset:0}; renderModal(); break;
    case 'close-assign-modal': ui.assignModal=null; renderModal(); break;
    case 'assign-modal-prev-week': ui.assignModal.weekOffset=(ui.assignModal.weekOffset||0)-1; renderModal(); break;
    case 'assign-modal-next-week': ui.assignModal.weekOffset=(ui.assignModal.weekOffset||0)+1; renderModal(); break;
    case 'assign-modal-pick-slot':
      addPlannerMeal(a.date,a.slot,ui.assignModal.title);
      ui.assignModal=null;
      renderModal();
      break;
    // planner
    case 'open-planner-modal':
      ui.plannerModal={date:a.date,slot:a.slot,mode:'add'};
      ui.plannerSearch='';ui.plannerShowCreate=false;ui.plannerShowLimit=40;
      ui.plannerMealFilter= a.slot==='Breakfast'?'Breakfast':a.slot==='Lunch'?'Lunch':a.slot==='Dinner'?'Dinner':a.slot==='Snack'?'Snack':a.slot==='Dessert'?'Dessert':'All';
      renderModal();break;
    case 'planner-filter-meal': ui.plannerMealFilter=a.val; ui.plannerShowLimit=40; partialUpdate('planner-modal-body',renderPlannerModalBody()); break;
    case 'planner-show-more': ui.plannerShowLimit=(ui.plannerShowLimit||40)+40; partialUpdate('planner-modal-body',renderPlannerModalBody()); break;
    case 'close-modal': ui.plannerModal=null;ui.plannerSearch='';ui.plannerShowCreate=false;renderModal();break;
    case 'planner-pick-recipe':
      commitPlannerMeal(a.date,a.slot,a.title);break;
    case 'planner-manual-add':{
      const title=ui.plannerSearch.trim();
      if(title) commitPlannerMeal(a.date,a.slot,title);
      else{ui.plannerModal=null;renderModal();}
    }break;
    case 'planner-toggle-create':
      ui.plannerShowCreate=!ui.plannerShowCreate;
      partialUpdate('planner-modal-body', renderPlannerModalBody());
      if(ui.plannerShowCreate) setTimeout(()=>{const t=document.getElementById('pr-title');if(t)t.focus();},0);
      break;
    case 'confirm-planner-meal':{
      // legacy path kept for safety
      const custInp=document.getElementById('planner-custom-input');
      const title=(custInp?.value||ui.plannerSearch||'').trim();
      if(title) commitPlannerMeal(a.date,a.slot,title);
      else{ui.plannerModal=null;renderModal();}
    }break;
    case 'confirm-planner-add-recipe':{
      const titleEl=document.getElementById('pr-title');
      const title=(titleEl?.value||ui.plannerSearch||'').trim();
      if(!title){titleEl?.focus();break;}
      const mealEl=document.getElementById('pr-meal');
      const cuisineEl=document.getElementById('pr-cuisine');
      const timeEl=document.getElementById('pr-time');
      const servEl=document.getElementById('pr-servings');
      const ingEl=document.getElementById('pr-ingredients');
      const stepsEl=document.getElementById('pr-steps');
      const ingredients=(ingEl?.value||'').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>({name:l,quantity:'',have:false}));
      const steps=(stepsEl?.value||'').split('\n').map(l=>l.trim()).filter(Boolean);
      const recipe={
        title,cuisine:cuisineEl?.value||'',mealType:mealEl?.value||a.slot,
        totalTimeMinutes:parseInt(timeEl?.value)||0,servings:parseInt(servEl?.value)||4,
        ingredients,steps,missingIngredients:[],usesLowStock:[],tags:[],
        dateAdded:new Date().toISOString()
      };
      saveRecipe(recipe);
      commitPlannerMeal(a.date,a.slot,title);
    }break;
    case 'clear-planner-meal':
      if(confirm('Remove "'+a.title+'" from '+a.slot+'?')) removePlannerMeal(a.date,a.slot,a.title);
      break;
    case 'planner-prev': ui.plannerWeekOffset--;render();break;
    case 'planner-next': ui.plannerWeekOffset++;render();break;
    case 'add-week-missing': addWeekMissingToGrocery();break;
    // cooking mode
    case 'open-cooking-mode':
      ui.cookingModal={date:a.date,slot:a.slot,meal:a.meal,checklist:{},generating:false,generatedRecipe:null,error:''};
      renderCookingModal();break;
    case 'close-cooking-modal':
      ui.cookingModal=null;renderCookingModal();break;
    case 'toggle-cooking-ingredient':
      if(ui.cookingModal){ui.cookingModal.checklist[a.name]=!ui.cookingModal.checklist[a.name];renderCookingModal();}break;
    case 'generate-meal-recipe':
      if(ui.cookingModal) generateRecipeForMeal();break;
    case 'save-generated-recipe':
      if(ui.cookingModal&&ui.cookingModal.generatedRecipe){
        saveRecipe(ui.cookingModal.generatedRecipe);
        ui.cookingModal.generatedRecipe=null; // it's now in cookbook; next open will find it
        renderCookingModal();render();
      }break;
    case 'add-recipe-for-meal':
      // Open the planner recipe picker with create form pre-filled — this edits the
      // already-planned title in place rather than adding a second entry for it
      ui.cookingModal=null;renderCookingModal();
      ui.plannerModal={date:a.date,slot:a.slot,mode:'replace',oldTitle:a.title};
      ui.plannerSearch=a.title||'';ui.plannerShowCreate=true;ui.plannerShowLimit=40;
      renderModal();break;
    case 'change-meal':
      ui.cookingModal=null;renderCookingModal();
      ui.plannerModal={date:a.date,slot:a.slot,mode:'replace',oldTitle:a.meal};
      ui.plannerSearch='';ui.plannerShowCreate=false;ui.plannerShowLimit=40;
      ui.plannerMealFilter=a.slot==='Breakfast'?'Breakfast':a.slot==='Lunch'?'Lunch':a.slot==='Dinner'?'Dinner':'All';
      renderModal();break;
    // recipe browser (within planner tab)
    case 'generate-random-recipes': if(!ui.generatingRandom) generateRandomRecipes();break;
    case 'toggle-browser-add-form':
      ui.browserShowAddForm=!ui.browserShowAddForm;
      render();break;
    case 'set-browser-meal':
      ui.browserMealFilter=a.val;
      partialUpdate('recipe-browser-list',renderRecipeBrowserList());
      break;
    // settings
    case 'set-settings-section': ui.settingsSection=a.val;render();break;
    case 'start-edit-cat':{const cat=state.settings.categories.find(c=>c.id===a.id);if(cat){ui.editCatId=a.id;ui.editCatName=cat.name;ui.editCatEmoji=cat.emoji;ui.editCatColor=cat.color;render();}}break;
    case 'cancel-edit-cat': ui.editCatId=null;render();break;
    case 'save-edit-cat':{
      const n=document.getElementById('edit-cat-name');const em=document.getElementById('edit-cat-emoji');
      if(n)ui.editCatName=n.value;if(em)ui.editCatEmoji=em.value;saveEditCat();
    }break;
    case 'set-edit-cat-color': ui.editCatColor=a.val;render();break;
    case 'set-new-cat-color': ui.newCatColor=a.val;render();break;
    case 'pick-edit-cat-emoji': ui.editCatEmoji=a.emoji;render();break;
    case 'pick-new-cat-emoji': ui.newCatEmoji=a.emoji;render();break;
    case 'open-add-cat': ui.showAddCat=true;render();break;
    case 'cancel-add-cat': ui.showAddCat=false;render();break;
    case 'add-category':{
      const n=document.getElementById('new-cat-name');const em=document.getElementById('new-cat-emoji');
      if(n)ui.newCatName=n.value;if(em)ui.newCatEmoji=em.value;addCategory();
    }break;
    case 'delete-cat': if(confirm('Delete this category?')){deleteCategory(a.id);}break;
    case 'add-store': addStore();break;
    case 'remove-store': removeStore(a.val);break;
    case 'add-cuisine': addCuisine();break;
    case 'remove-cuisine': removeCuisine(a.val);break;
    case 'save-household':{const inp=document.getElementById('household-name-input');if(inp)ui.householdEdit=inp.value;saveHousehold();}break;
    // auth
    case 'sign-out': signOut();break;
    case 'retry-boot': boot();break;
    case 'set-auth-mode': ui.authMode=a.val;ui.loginError='';ui.signupError='';renderLogin();break;
    case 'generate-invite': generateInvite();break;
    case 'generate-new-family-invite': generateNewFamilyInvite();break;
    case 'buy-credits': buyCredits(a.pack);break;
    case 'remove-member': removeMember(a.id,a.email);break;
    case 'split-off-member': splitOffMember(a.id,a.email);break;
    case 'self-split-off': selfSplitOff();break;
    case 'leave-household': leaveHousehold();break;
    case 'save-profile': saveProfile();break;
    case 'set-accent-color': setAccentColor(a.val);break;
    case 'reset-accent-color': resetAccentColor();break;
    case 'reset-member-password': resetMemberPassword(a.id,a.email);break;
    case 'set-household-sub': ui.householdSubSection=a.val;render();break;
    case 'set-admin-sub': ui.adminSubSection=a.val;render();break;
    case 'toggle-acct-edit':
      ui.acctEditField=ui.acctEditField===a.field?null:a.field;
      ui.profileMsg='';ui.accountMsg='';ui.accountErr='';ui.emailMsg='';ui.emailErr='';
      render();break;
    case 'open-billing': ui.tab='settings';ui.settingsSection='household';ui.householdSubSection='billing';render();break;
  }
});

document.addEventListener('input',e=>{
  const el=e.target;const live=el.dataset.live;
  if(!live) return;
  if(live==='kitchen-search'){
    ui.kitchenSearch=el.value;
    partialUpdate('kitchen-shelves', renderKitchenShelves());
  }
  else if(live==='grocery-search'){
    ui.grocerySearch=el.value;
    partialUpdate('grocery-list-body', renderGroceryBody());
  }
  else if(live==='cb-search'){
    ui.cbSearch=el.value;
    partialUpdate('cookbook-cards', renderCookbookCards());
  }
  else if(live==='grocery-quick-name'){
    const name=el.value;
    const guess=guessCategory(name);
    const cat=getCat(guess);
    ui.groceryQuickCat=guess;ui.groceryQuickCatBg=cat.bg;ui.groceryQuickCatColor=cat.color;ui.groceryQuickEmoji=cat.emoji;
    const preview=document.getElementById('grocery-cat-preview');
    if(preview){preview.textContent=cat.emoji+' '+guess;preview.style.background=cat.bg;preview.style.color=cat.color;}
  }
  else if(live==='item-name-auto'){
    const sel=document.getElementById('item-cat-select');
    if(sel&&!sel.dataset.touched){sel.value=guessCategory(el.value);}
    const emojiInput=document.getElementById('item-emoji-input');
    if(emojiInput){emojiInput.placeholder=guessItemEmoji(el.value)||getCat(sel?sel.value:'Other').emoji;}
  }
  else if(live==='new-store'){ui.newStore=el.value;}
  else if(live==='new-cuisine'){ui.newCuisine=el.value;}
  else if(live==='household-name'){ui.householdEdit=el.value;}
  else if(live==='planner-search'){
    ui.plannerSearch=el.value;
    ui.plannerShowLimit=40;
    partialUpdate('planner-modal-body', renderPlannerModalBody());
  }
  else if(live==='browser-search'){
    ui.browserSearch=el.value;
    partialUpdate('recipe-browser-list', renderRecipeBrowserList());
  }
});

document.addEventListener('change',e=>{
  const el=e.target;const ch=el.dataset.change;
  if(!ch) return;
  if(ch==='g-qty'){updateGroceryField(el.dataset.id,'quantity',el.value);}
  else if(ch==='g-store'){updateGroceryField(el.dataset.id,'store',el.value);}
  else if(ch==='g-cat'){
    updateGroceryField(el.dataset.id,'category',el.value);
    // Partial update so border colour and select background both reflect new category
    partialUpdate('grocery-list-body', renderGroceryBody());
  }
  else if(ch==='g-priority'){
    updateGroceryField(el.dataset.id,'priority',el.value);
    // Partial update since priority affects sort order and the badge shown
    partialUpdate('grocery-list-body', renderGroceryBody());
  }
  else if(ch==='grocery-store-filter'){ui.groceryStore=el.value;render();}
  else if(ch==='cook-meal'){ui.cookFilters.mealType=el.value;}
  else if(ch==='cook-cuisine'){ui.cookFilters.cuisine=el.value;render();}
  else if(ch==='cook-time'){ui.cookFilters.maxTime=el.value;}
  else if(ch==='cook-prefer-have'){ui.cookFilters.preferHave=el.checked;}
  else if(ch==='item-cat') {const sel=document.getElementById('item-cat-select');if(sel)sel.dataset.touched='1';}
  else if(ch==='signup-invite-check'){ checkSignupInvite(el.value.trim()); }
});

document.addEventListener('submit',e=>{
  e.preventDefault();
  const form=e.target.closest('[data-form]');if(!form)return;
  const fd=new FormData(form);
  if(form.dataset.form==='add-item'){addOrUpdateItem(fd);}
  else if(form.dataset.form==='add-grocery'){
    addGroceryItem((fd.get('name')||'').trim(),fd.get('category')||'Other',(fd.get('note')||'').trim(),false,(fd.get('quantity')||'').trim(),(fd.get('store')||'').trim(),fd.get('priority')||'normal');
    ui.showAddGrocery=false;saveGrocery();render();
  }
  else if(form.dataset.form==='add-cookbook'){addManualRecipe(fd);ui.browserShowAddForm=false;}
  else if(form.dataset.form==='login'){submitLogin();}
  else if(form.dataset.form==='signup'){submitSignup();}
  else if(form.dataset.form==='change-password'){changePassword();}
  else if(form.dataset.form==='change-email'){changeEmail();}
});

// ─── INIT ─────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
