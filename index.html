// ─── API: FIND RECIPES ────────────────────────────────────────────────────
async function findRecipes(){
  ui.recipeStatus='loading';ui.recipeError='';render();
  const f=ui.cookFilters;
  const cuisine=f.cuisine==='Other'?(f.customCuisine||'Any'):f.cuisine;
  const customCuisineEl=document.getElementById('cook-custom-cuisine');
  const notesEl=document.getElementById('cook-notes');
  const actualCuisine=cuisine==='Other'&&customCuisineEl?customCuisineEl.value:cuisine;
  const actualNotes=notesEl?notesEl.value:f.notes;
  const payload={
    inventory:state.inventory.map(i=>({name:i.name,quantity:i.quantity,unit:i.unit,location:i.location,low:isLow(i)})),
    groceryList:state.grocery.filter(g=>!g.checked).map(g=>g.name),
    mealType:f.mealType,cuisine:actualCuisine,
    maxTotalTimeMinutes:f.maxTime==='any'?null:Number(f.maxTime),
    preferUseWhatIHave:!!f.preferHave,extraNotes:actualNotes
  };
  const system='You are the recipe engine inside a home kitchen app called PantryPal. Respond ONLY with a raw JSON array — no markdown fences, no commentary — of exactly 3 recipe objects: [{"title":string,"cuisine":string,"mealType":string,"prepTimeMinutes":number,"cookTimeMinutes":number,"totalTimeMinutes":number,"servings":number,"ingredients":[{"name":string,"quantity":string,"have":boolean}],"missingIngredients":[string],"steps":[string],"usesLowStock":[string],"tags":[string]}]. Mark ingredient have:true if it loosely matches the inventory (plurals, synonyms OK). Assume salt, pepper, oil, water always available. Honor mealType/cuisine/maxTotalTimeMinutes as hard filters when not Any/null. If preferUseWhatIHave, strongly favor recipes with few missing ingredients, especially using low-stock items. Keep steps to 4-6 imperative sentences each under 15 words. Respond with strict JSON only.';
  try{
    const res=await fetch('/.netlify/functions/generate-recipe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({max_tokens:1000,system,messages:[{role:'user',content:JSON.stringify(payload)}]})});
    const data=await res.json();
    let text=(data.content||[]).find(b=>b.type==='text')?.text||'';
    text=text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const s=text.indexOf('[');const e=text.lastIndexOf(']');
    if(s>-1&&e>-1) text=text.slice(s,e+1);
    const recipes=JSON.parse(text);
    if(!Array.isArray(recipes)||!recipes.length) throw new Error('empty');
    ui.recipes=recipes;ui.recipeStatus='done';
  }catch(err){
    console.error(err);ui.recipeStatus='error';
    ui.recipeError='Could not fetch recipes. Check your filters and try again.';
  }
  render();
}

// ─── EVENT DELEGATION ─────────────────────────────────────────────────────
function partialUpdate(id,html){const el=document.getElementById(id);if(el)el.innerHTML=html;}

document.addEventListener('click',e=>{
  // Close modals when clicking the overlay backgrounds
  if(e.target.id==='pp-modal-overlay'){
    ui.plannerModal=null;ui.plannerSearch='';ui.plannerShowCreate=false;renderModal();return;
  }
  if(e.target.id==='pp-cooking-overlay'){
    ui.cookingModal=null;renderCookingModal();return;
  }
  const el=e.target.closest('[data-action]');if(!el)return;
  const a=el.dataset;
  switch(a.action){
    // nav
    case 'set-tab': ui.tab=a.tab; if(a.tab==='cook'&&ui.recipeStatus==='idle') ui.tab='cook'; render(); break;
    // kitchen
    case 'open-add-item': ui.showAddItem=true;ui.editingItemId=null;render();break;
    case 'cancel-add-item': ui.showAddItem=false;ui.editingItemId=null;render();break;
    case 'edit-item':{const item=state.inventory.find(i=>i.id===a.id);if(item){ui.editingItemId=a.id;ui.showAddItem=true;render();}}break;
    case 'delete-item': if(confirm('Remove '+( state.inventory.find(i=>i.id===a.id)?.name||'this item')+'?')){deleteItem(a.id);}break;
    case 'adj-qty': adjustQty(a.id,Number(a.delta));break;
    case 'quick-add-grocery':{const item=state.inventory.find(i=>i.id===a.id);if(item){addGroceryItem(item.name,item.category,'',true);saveGrocery();render();}}break;
    case 'reset-kitchen-filters': ui.kitchenLoc='All';ui.kitchenExpiry='all';render();break;
    case 'set-kitchen-loc': ui.kitchenLoc=a.val;ui.kitchenExpiry='all';render();break;
    case 'set-kitchen-expiry': ui.kitchenExpiry=a.val;ui.kitchenLoc='All';render();break;
    // grocery
    case 'toggle-checked': toggleChecked(a.id);break;
    case 'delete-grocery': deleteGrocery(a.id);break;
    case 'clear-checked': clearChecked();break;
    case 'add-all-low-stock': addAllLowStock();break;
    case 'quick-add-grocery-form':{
      const qInput=document.getElementById('grocery-quick-input');
      const qQty=document.getElementById('grocery-quick-qty');
      const qStore=document.getElementById('grocery-quick-store');
      const name=(qInput?.value||'').trim();
      if(name){addGroceryItem(name,ui.groceryQuickCat,'',false,qQty?.value||'',qStore?.value||'');saveGrocery();
        if(qInput)qInput.value='';if(qQty)qQty.value='';if(qStore)qStore.value='';
        ui.groceryQuickCat='Other';ui.groceryQuickCatBg='#E2DCCB';ui.groceryQuickCatColor='#6B7160';ui.groceryQuickEmoji='📦';
        render();}
    }break;
    case 'close-add-grocery': ui.showAddGrocery=false;render();break;
    case 'set-grocery-group': ui.groceryGroup=a.val;render();break;
    case 'toggle-show-checked': ui.showChecked=!ui.showChecked;render();break;
    case 'share-grocery':{
      const text=state.grocery.filter(g=>!g.checked).map(g=>(g.quantity?g.quantity+' ':'')+g.name+(g.store?' ('+g.store+')':'')).join('\n');
      navigator.share({title:'Grocery List',text}).catch(()=>{});
    }break;
    case 'copy-grocery':{
      const text=state.grocery.filter(g=>!g.checked).map(g=>(g.quantity?g.quantity+' ':'')+g.name+(g.store?' ('+g.store+')':'')).join('\n');
      navigator.clipboard.writeText(text).then(()=>alert('Copied to clipboard!')).catch(()=>{});
    }break;
    // cook
    case 'find-recipes': findRecipes();break;
    case 'use-what-i-have': ui.cookFilters.mealType='Any';ui.cookFilters.cuisine='Any';ui.cookFilters.maxTime='any';ui.cookFilters.preferHave=true;findRecipes();break;
    case 'add-missing-grocery': addMissingToGrocery(Number(a.idx));break;
    case 'save-recipe':{const r=ui.recipes[Number(a.idx)];if(r){saveRecipe(r);render();}}break;
    // cookbook
    case 'open-add-cookbook': ui.showAddCookbook=true;render();break;
    case 'close-add-cookbook': ui.showAddCookbook=false;render();break;
    case 'toggle-cb-expand': ui.expandedCbId=(ui.expandedCbId===a.id?null:a.id);render();break;
    case 'delete-cookbook': if(confirm('Remove this recipe?')){deleteCookbookItem(a.id);}break;
    case 'set-cb-meal': ui.cbMealFilter=a.val;render();break;
    case 'toggle-cb-can-make': ui.cbCanMake=!ui.cbCanMake;render();break;
    case 'add-cookbook-missing': addCookbookMissingToGrocery(a.id);break;
    case 'plan-from-cookbook':
      ui.tab='planner';
      // Pre-seed planner search so user can drop it into a slot immediately
      ui.plannerSearch=a.title||'';
      render();
      break;
    // planner
    case 'open-planner-modal':
      ui.plannerModal={date:a.date,slot:a.slot};
      ui.plannerSearch='';ui.plannerShowCreate=false;
      ui.plannerMealFilter= a.slot==='Breakfast'?'Breakfast':a.slot==='Lunch'?'Lunch':a.slot==='Dinner'?'Dinner':'All';
      renderModal();break;
    case 'planner-filter-meal': ui.plannerMealFilter=a.val; partialUpdate('planner-modal-body',renderPlannerModalBody()); break;
    case 'close-modal': ui.plannerModal=null;ui.plannerSearch='';ui.plannerShowCreate=false;renderModal();break;
    case 'planner-pick-recipe':
      setPlannerMeal(a.date,a.slot,a.title);break;
    case 'planner-manual-add':{
      const title=ui.plannerSearch.trim();
      if(title) setPlannerMeal(a.date,a.slot,title);
      else{ui.plannerModal=null;renderModal();}
    }break;
    case 'planner-toggle-create':
      ui.plannerShowCreate=!ui.plannerShowCreate;
      partialUpdate('planner-modal-body', renderPlannerModalBody());
      if(ui.plannerShowCreate) setTimeout(()=>{const t=document.getElementById('pr-title');if(t)t.focus();},0);
      break;
    case 'confirm-planner-meal':{
      // legacy path kept for safety
      const custInp=document.getElementById('planner-custom-input');
      const title=(custInp?.value||ui.plannerSearch||'').trim();
      if(title) setPlannerMeal(a.date,a.slot,title);
      else{ui.plannerModal=null;renderModal();}
    }break;
    case 'confirm-planner-add-recipe':{
      const titleEl=document.getElementById('pr-title');
      const title=(titleEl?.value||ui.plannerSearch||'').trim();
      if(!title){titleEl?.focus();break;}
      const mealEl=document.getElementById('pr-meal');
      const cuisineEl=document.getElementById('pr-cuisine');
      const timeEl=document.getElementById('pr-time');
      const servEl=document.getElementById('pr-servings');
      const ingEl=document.getElementById('pr-ingredients');
      const stepsEl=document.getElementById('pr-steps');
      const ingredients=(ingEl?.value||'').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>({name:l,quantity:'',have:false}));
      const steps=(stepsEl?.value||'').split('\n').map(l=>l.trim()).filter(Boolean);
      const recipe={
        title,cuisine:cuisineEl?.value||'',mealType:mealEl?.value||a.slot,
        totalTimeMinutes:parseInt(timeEl?.value)||0,servings:parseInt(servEl?.value)||4,
        ingredients,steps,missingIngredients:[],usesLowStock:[],tags:[],
        dateAdded:new Date().toISOString()
      };
      saveRecipe(recipe);
      setPlannerMeal(a.date,a.slot,title);
    }break;
    case 'clear-planner-meal': clearPlannerMeal(a.date,a.slot);break;
    case 'planner-prev': ui.plannerWeekOffset--;render();break;
    case 'planner-next': ui.plannerWeekOffset++;render();break;
    case 'add-week-missing': addWeekMissingToGrocery();break;
    // cooking mode
    case 'open-cooking-mode':
      ui.cookingModal={date:a.date,slot:a.slot,meal:a.meal,checklist:{},generating:false,generatedRecipe:null,error:''};
      renderCookingModal();break;
    case 'close-cooking-modal':
      ui.cookingModal=null;renderCookingModal();break;
    case 'toggle-cooking-ingredient':
      if(ui.cookingModal){ui.cookingModal.checklist[a.name]=!ui.cookingModal.checklist[a.name];renderCookingModal();}break;
    case 'generate-meal-recipe':
      if(ui.cookingModal) generateRecipeForMeal();break;
    case 'save-generated-recipe':
      if(ui.cookingModal&&ui.cookingModal.generatedRecipe){
        saveRecipe(ui.cookingModal.generatedRecipe);
        ui.cookingModal.generatedRecipe=null; // it's now in cookbook; next open will find it
        renderCookingModal();render();
      }break;
    case 'add-recipe-for-meal':
      // Open the planner recipe picker with create form pre-filled
      ui.cookingModal=null;renderCookingModal();
      ui.plannerModal={date:a.date,slot:a.slot};
      ui.plannerSearch=a.title||'';ui.plannerShowCreate=true;
      renderModal();break;
    case 'change-meal':
      ui.cookingModal=null;renderCookingModal();
      ui.plannerModal={date:a.date,slot:a.slot};
      ui.plannerSearch='';ui.plannerShowCreate=false;
      ui.plannerMealFilter=a.slot==='Breakfast'?'Breakfast':a.slot==='Lunch'?'Lunch':a.slot==='Dinner'?'Dinner':'All';
      renderModal();break;
    // recipe browser (within planner tab)
    case 'browser-plan-recipe':
      ui.browserPlanTitle=(ui.browserPlanTitle===a.title)?null:a.title;
      partialUpdate('recipe-browser-list',renderRecipeBrowserList());
      break;
    case 'browser-assign-slot':
      setPlannerMeal(a.date,a.slot,a.title);
      ui.browserPlanTitle=null;
      break;
    case 'generate-random-recipes': if(!ui.generatingRandom) generateRandomRecipes();break;
    case 'toggle-browser-add-form':
      ui.browserShowAddForm=!ui.browserShowAddForm;
      render();break;
    case 'set-browser-meal':
      ui.browserMealFilter=a.val;
      partialUpdate('recipe-browser-list',renderRecipeBrowserList());
      break;
    // settings
    case 'set-settings-section': ui.settingsSection=a.val;render();break;
    case 'start-edit-cat':{const cat=state.settings.categories.find(c=>c.id===a.id);if(cat){ui.editCatId=a.id;ui.editCatName=cat.name;ui.editCatEmoji=cat.emoji;ui.editCatColor=cat.color;render();}}break;
    case 'cancel-edit-cat': ui.editCatId=null;render();break;
    case 'save-edit-cat':{
      const n=document.getElementById('edit-cat-name');const em=document.getElementById('edit-cat-emoji');
      if(n)ui.editCatName=n.value;if(em)ui.editCatEmoji=em.value;saveEditCat();
    }break;
    case 'set-edit-cat-color': ui.editCatColor=a.val;render();break;
    case 'set-new-cat-color': ui.newCatColor=a.val;render();break;
    case 'open-add-cat': ui.showAddCat=true;render();break;
    case 'cancel-add-cat': ui.showAddCat=false;render();break;
    case 'add-category':{
      const n=document.getElementById('new-cat-name');const em=document.getElementById('new-cat-emoji');
      if(n)ui.newCatName=n.value;if(em)ui.newCatEmoji=em.value;addCategory();
    }break;
    case 'delete-cat': if(confirm('Delete this category?')){deleteCategory(a.id);}break;
    case 'add-store': addStore();break;
    case 'remove-store': removeStore(a.val);break;
    case 'add-cuisine': addCuisine();break;
    case 'remove-cuisine': removeCuisine(a.val);break;
    case 'save-household':{const inp=document.getElementById('household-name-input');if(inp)ui.householdEdit=inp.value;saveHousehold();}break;
  }
});

document.addEventListener('input',e=>{
  const el=e.target;const live=el.dataset.live;
  if(!live) return;
  if(live==='kitchen-search'){
    ui.kitchenSearch=el.value;
    partialUpdate('kitchen-shelves', renderKitchenShelves());
  }
  else if(live==='grocery-search'){
    ui.grocerySearch=el.value;
    partialUpdate('grocery-list-body', renderGroceryBody());
  }
  else if(live==='cb-search'){
    ui.cbSearch=el.value;
    partialUpdate('cookbook-cards', renderCookbookCards());
  }
  else if(live==='grocery-quick-name'){
    const name=el.value;
    const guess=guessCategory(name);
    const cat=getCat(guess);
    ui.groceryQuickCat=guess;ui.groceryQuickCatBg=cat.bg;ui.groceryQuickCatColor=cat.color;ui.groceryQuickEmoji=cat.emoji;
    const preview=document.getElementById('grocery-cat-preview');
    if(preview){preview.textContent=cat.emoji+' '+guess;preview.style.background=cat.bg;preview.style.color=cat.color;}
  }
  else if(live==='item-name-auto'){
    const sel=document.getElementById('item-cat-select');
    if(sel&&!sel.dataset.touched){sel.value=guessCategory(el.value);}
  }
  else if(live==='new-store'){ui.newStore=el.value;}
  else if(live==='new-cuisine'){ui.newCuisine=el.value;}
  else if(live==='household-name'){ui.householdEdit=el.value;}
  else if(live==='planner-search'){
    ui.plannerSearch=el.value;
    partialUpdate('planner-modal-body', renderPlannerModalBody());
  }
  else if(live==='browser-search'){
    ui.browserSearch=el.value;
    partialUpdate('recipe-browser-list', renderRecipeBrowserList());
  }
});

document.addEventListener('change',e=>{
  const el=e.target;const ch=el.dataset.change;
  if(!ch) return;
  if(ch==='g-qty'){updateGroceryField(el.dataset.id,'quantity',el.value);}
  else if(ch==='g-store'){updateGroceryField(el.dataset.id,'store',el.value);}
  else if(ch==='g-cat'){
    updateGroceryField(el.dataset.id,'category',el.value);
    // Partial update so border colour and select background both reflect new category
    partialUpdate('grocery-list-body', renderGroceryBody());
  }
  else if(ch==='grocery-store-filter'){ui.groceryStore=el.value;render();}
  else if(ch==='cook-meal'){ui.cookFilters.mealType=el.value;}
  else if(ch==='cook-cuisine'){ui.cookFilters.cuisine=el.value;render();}
  else if(ch==='cook-time'){ui.cookFilters.maxTime=el.value;}
  else if(ch==='cook-prefer-have'){ui.cookFilters.preferHave=el.checked;}
  else if(ch==='item-cat') {const sel=document.getElementById('item-cat-select');if(sel)sel.dataset.touched='1';}
});

document.addEventListener('submit',e=>{
  e.preventDefault();
  const form=e.target.closest('[data-form]');if(!form)return;
  const fd=new FormData(form);
  if(form.dataset.form==='add-item'){addOrUpdateItem(fd);}
  else if(form.dataset.form==='add-grocery'){
    addGroceryItem((fd.get('name')||'').trim(),fd.get('category')||'Other',(fd.get('note')||'').trim(),false,(fd.get('quantity')||'').trim(),(fd.get('store')||'').trim());
    ui.showAddGrocery=false;saveGrocery();render();
  }
  else if(form.dataset.form==='add-cookbook'){addManualRecipe(fd);ui.browserShowAddForm=false;}
});

// ─── INIT ─────────────────────────────────────────────────────────────────
loadState();
render();
</script>
