<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PantryPal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F0E8; --card:#FDFAF5; --ink:#2C1F0E; --ink-soft:#9A8A78; --border:#E8DDD0;
  --green:#3A6E32; --green-soft:#DCE8CE; --orange:#C4693A; --orange-soft:#F0D6C9;
  --header:#111810; --gold:#C2941F; --gold-soft:#FCEFC7;
  --r:14px; --shadow:0 2px 8px rgba(44,31,14,.09); --shadow-sm:0 1px 3px rgba(44,31,14,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,sans-serif;min-height:100vh;}
button,input,select,textarea{font-family:inherit;}
:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
input::placeholder,textarea::placeholder{color:var(--ink-soft);}

/* HEADER */
.pp-header{background:var(--header);height:56px;padding:0 20px;display:flex;align-items:center;position:sticky;top:0;z-index:200;border-bottom:1px solid #222E20;}
.pp-logo{font-family:'Bitter',Georgia,serif;font-size:21px;font-weight:700;color:#F0E8D8;letter-spacing:-.01em;}
.pp-logo span{color:var(--green);}
.pp-household{margin-left:auto;display:flex;align-items:center;gap:10px;}
.pp-household-name{font-size:12px;color:#9FBAA9;font-weight:700;}
.pp-avatars{display:flex;}
.pp-avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--header);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;flex-shrink:0;}
.pp-avatar:not(:first-child){margin-left:-7px;}

/* TABS */
.pp-tabs{background:var(--card);border-bottom:2px solid var(--border);padding:0 16px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:190;}
.pp-tabs::-webkit-scrollbar{display:none;}
.pp-tab{font-family:'Nunito';font-weight:800;font-size:13px;padding:13px 14px 11px;border:none;background:none;cursor:pointer;color:var(--ink-soft);border-bottom:3px solid transparent;white-space:nowrap;margin-bottom:-2px;transition:color .15s,border-color .15s;}
.pp-tab.active{color:var(--green);border-bottom-color:var(--green);}

/* ALERT STRIP */
.alert-strip{background:#FEFBF4;border-bottom:1px solid #EAD9B4;padding:9px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.alert-badge{font-size:11px;font-weight:900;padding:3px 10px;border-radius:14px;white-space:nowrap;}
.alert-badge.expiring{background:var(--orange);color:#fff;}
.alert-badge.low{background:var(--gold-soft);color:#7A5C1A;border:1px solid #E0CC90;}
.alert-text{font-size:13px;color:#7A5F44;font-weight:600;margin-right:4px;}
.alert-add-btn{font-size:12px;color:#fff;font-weight:800;background:var(--green);border:none;cursor:pointer;padding:5px 14px;border-radius:8px;white-space:nowrap;margin-left:auto;}

/* CONTENT */
.pp-content{max-width:1080px;margin:0 auto;padding:20px 18px 90px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);}
.card-lg{padding:18px;}
.card-sm{padding:12px 16px;}

/* BUTTONS */
.btn{border:none;border-radius:10px;cursor:pointer;font-weight:800;font-size:13px;padding:9px 16px;white-space:nowrap;transition:filter .1s;}
.btn:hover{filter:brightness(.95);}
.btn-primary{background:var(--green);color:#fff;}
.btn-secondary{background:var(--card);color:var(--ink);border:1px solid var(--border);}
.btn-ghost{background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:13px;font-weight:700;padding:6px 10px;}
.btn-ghost:hover{color:var(--ink);}
.btn-icon{background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--ink-soft);font-size:13px;padding:5px 10px;font-weight:700;}
.btn-icon:hover{border-color:var(--ink-soft);color:var(--ink);}

/* FORMS */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px;animation:fadeUp .15s ease;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
.field label{display:block;font-size:11px;color:var(--ink-soft);font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;background:#fff;font-size:13.5px;color:var(--ink);font-weight:600;}
.field input:focus,.field select:focus{border-color:var(--green);outline:none;}
.form-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 14px;flex:1;min-width:180px;box-shadow:var(--shadow-sm);}
.search-box input{border:none;background:transparent;font-size:13.5px;font-weight:600;color:var(--ink);flex:1;min-width:0;}
.search-box input:focus{outline:none;}
.search-icon{color:var(--ink-soft);font-size:15px;flex-shrink:0;}
.pill-filters{display:flex;gap:6px;flex-wrap:wrap;}
.pill-btn{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink-soft);}
.pill-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* SHELF */
.shelf{margin-bottom:20px;}
.shelf-header{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
.shelf-tag{font-family:'Nunito';font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:3px 11px;border-radius:20px;display:flex;align-items:center;gap:5px;}
.shelf-count{font-size:12px;color:var(--ink-soft);font-weight:700;}

/* KITCHEN ITEM ROW */
.item-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;flex-wrap:wrap;transition:box-shadow .1s;}
.item-row:hover{box-shadow:var(--shadow);}
.item-emoji{font-size:18px;flex-shrink:0;}
.item-main{flex:1;min-width:120px;}
.item-name{font-weight:800;font-size:14px;}
.item-meta{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:2px;}
.low-badge{font-size:10px;font-weight:900;border:1.5px solid var(--orange);color:var(--orange);padding:1px 7px;border-radius:8px;margin-left:7px;vertical-align:middle;display:inline-block;transform:rotate(-3deg);}
.qty-row{display:flex;align-items:center;gap:6px;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-weight:900;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;}
.qty-val{font-family:'JetBrains Mono';font-size:13px;font-weight:500;min-width:32px;text-align:center;}

/* GROCERY ROWS */
.g-section{margin-bottom:20px;}
.g-row{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;}
.g-row.done{opacity:.55;}
.g-row.done .g-name{text-decoration:line-through;color:var(--ink-soft);}
.check-circle{width:24px;height:24px;border-radius:50%;border:2.5px solid var(--green);background:#fff;cursor:pointer;flex-shrink:0;margin-top:1px;position:relative;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:transparent;transition:background .1s,color .1s;}
.check-circle.checked{background:var(--green);color:#fff;}
.g-main{flex:1;min-width:0;}
.g-name{font-weight:800;font-size:14px;}
.g-fields{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.g-input{padding:5px 9px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;background:#fff;color:var(--ink);}
.g-input:focus{border-color:var(--green);outline:none;}
.g-qty{width:80px;}
.g-store{width:120px;}
.cat-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:2px 9px;border-radius:10px;white-space:nowrap;margin-top:5px;}
.cat-select{display:inline-block;font-size:11px;font-weight:800;padding:3px 8px;border-radius:10px;border:1.5px solid transparent;cursor:pointer;margin-top:5px;max-width:200px;font-family:'Nunito',inherit;transition:border-color .1s;}
.cat-select:hover{border-color:rgba(0,0,0,.15);}
.cat-select:focus{outline:2px solid var(--green);outline-offset:1px;}
.g-note{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:3px;}
.low-tag{font-size:10px;font-weight:900;color:var(--orange);border:1px solid var(--orange);padding:1px 7px;border-radius:8px;margin-left:6px;}

/* GROCERY QUICK ADD */
.g-quick-add{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;flex-wrap:wrap;box-shadow:var(--shadow-sm);}
.g-quick-add input{flex:1;min-width:160px;border:none;background:transparent;font-size:14px;font-weight:700;color:var(--ink);}
.g-quick-add input:focus{outline:none;}
.cat-preview{font-size:12px;font-weight:800;padding:3px 10px;border-radius:10px;white-space:nowrap;}

/* RECIPE CARDS */
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;margin-top:16px;}
.recipe-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm);animation:fadeUp .2s ease;}
.recipe-card h3{font-family:'Bitter',Georgia,serif;font-size:18px;font-weight:700;margin-bottom:8px;line-height:1.2;}
.recipe-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:10px;}
.badge-cuisine{background:var(--gold-soft);color:#8A6A12;}
.badge-meal{background:var(--green-soft);color:#3F5536;}
.recipe-meta{font-family:'JetBrains Mono';font-size:12px;color:var(--ink-soft);margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap;}
.ing-list{list-style:none;margin-bottom:12px;}
.ing-list li{display:flex;align-items:baseline;gap:7px;padding:4px 0;border-bottom:1px dashed var(--border);font-size:13px;}
.ing-have{color:var(--green);font-weight:900;font-size:11px;}
.ing-miss{color:var(--orange);font-weight:900;font-size:11px;}
.recipe-steps{list-style:decimal;padding-left:18px;margin-bottom:14px;font-size:13px;line-height:1.6;}
.recipe-steps li{margin-bottom:4px;}
.uses-low{font-size:12px;color:var(--orange);font-weight:700;margin-bottom:8px;background:var(--orange-soft);padding:5px 10px;border-radius:8px;}
.recipe-actions{display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border);padding-top:12px;}

/* COOKBOOK CARD */
.cb-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);animation:fadeUp .2s ease;}
.cb-card h3{font-family:'Bitter',Georgia,serif;font-size:16px;font-weight:700;margin-bottom:6px;}
.cb-meta{font-size:12px;color:var(--ink-soft);font-weight:700;margin-bottom:10px;display:flex;gap:12px;flex-wrap:wrap;}
.cb-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}

/* FILTERS BAR */
.filters-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:18px;box-shadow:var(--shadow-sm);}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.filter-field{display:flex;flex-direction:column;gap:4px;min-width:130px;}
.filter-field label{font-size:11px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
.filter-field select,.filter-field input{padding:8px 12px;border:1.5px solid var(--border);border-radius:9px;background:#fff;font-size:13px;font-weight:700;color:var(--ink);}
.filter-field select:focus,.filter-field input:focus{border-color:var(--green);outline:none;}
.check-option{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;margin-top:10px;}

/* PLANNER */
.planner-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.planner-nav{width:36px;height:36px;border-radius:50%;background:var(--card);border:1.5px solid var(--border);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--ink);}
.planner-title{flex:1;text-align:center;}
.planner-title h2{font-family:'Bitter',Georgia,serif;font-size:20px;font-weight:700;}
.planner-title p{font-size:12px;color:var(--ink-soft);font-weight:700;margin-top:2px;}
.planner-grid{display:flex;flex-direction:column;gap:10px;}
.planner-day{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);}
.planner-day-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#FDFAF5;border-bottom:1px solid var(--border);}
.day-label{font-family:'Bitter',Georgia,serif;font-weight:700;font-size:15px;}
.day-date{font-size:12px;color:var(--ink-soft);font-weight:700;}
.today-chip{font-size:10px;font-weight:900;background:var(--green);color:#fff;padding:2px 8px;border-radius:8px;}
.planner-slots{display:grid;grid-template-columns:repeat(3,1fr);}
.planner-slot{padding:10px 12px;border-right:1px solid var(--border);min-height:76px;cursor:pointer;transition:background .1s;}
.planner-slot:last-child{border-right:none;}
.planner-slot:hover{background:#F7F3EC;}
.slot-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:5px;}
.slot-add-btn{display:flex;align-items:center;justify-content:center;gap:5px;border:1.5px dashed var(--border);border-radius:8px;color:var(--ink-soft);font-size:11px;font-weight:800;padding:7px 4px;min-height:34px;margin-top:2px;transition:border-color .15s,color .15s;}
.planner-slot:hover .slot-add-btn{border-color:var(--green);color:var(--green);}
.slot-meal{font-size:13px;font-weight:700;color:var(--ink);line-height:1.35;}
.slot-meal-meta{font-size:10px;color:var(--ink-soft);font-weight:700;margin-top:3px;}
/* Recipe Browser */
.recipe-browser-section{margin-top:32px;border-top:2px solid var(--border);padding-top:26px;}
.recipe-browser-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.recipe-browser-header h3{font-family:'Bitter',Georgia,serif;font-size:20px;font-weight:700;flex:1;margin:0;}
.browser-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.browser-card-wrap{display:flex;flex-direction:column;}
.browser-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .1s,background .1s;}
.browser-card:hover,.browser-card.active{border-color:var(--green);}
.browser-card.active{border-radius:12px 12px 0 0;background:#FDFAF5;}
.browser-card-name{font-weight:800;font-size:13.5px;line-height:1.3;flex:1;}
.browser-card-meta{font-size:11.5px;color:var(--ink-soft);font-weight:700;margin-top:2px;}
.browser-plan-btn{font-size:11px;font-weight:900;padding:5px 12px;border-radius:8px;border:1.5px solid var(--green);color:var(--green);background:transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.browser-plan-btn.active{background:var(--green);color:#fff;}
.slot-picker{padding:10px 14px;background:var(--green-soft);border:1.5px solid var(--green);border-top:none;border-radius:0 0 12px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.slot-pick-btn{font-size:10px;font-weight:900;padding:5px 10px;border-radius:6px;border:1px solid var(--green);background:#fff;color:#2C6E2E;cursor:pointer;white-space:nowrap;transition:background .1s;}
.slot-pick-btn:hover{background:var(--green);color:#fff;}
.slot-pick-btn.taken{opacity:.55;border-style:dashed;}

/* PLANNER MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(17,24,16,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-sheet{background:var(--card);border-radius:var(--r);width:100%;max-width:540px;max-height:88vh;overflow-y:auto;padding:22px;box-shadow:0 12px 40px rgba(17,24,16,.3);}
.modal-title{font-family:'Bitter',Georgia,serif;font-size:20px;font-weight:700;margin-bottom:18px;}
.modal-close{float:right;font-size:24px;background:none;border:none;cursor:pointer;color:var(--ink-soft);margin-top:-4px;line-height:1;}

/* SETTINGS */
.settings-nav{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px;}
.settings-section-title{font-family:'Bitter',Georgia,serif;font-size:18px;font-weight:700;margin-bottom:12px;}
.settings-row{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;}
.settings-emoji{font-size:20px;flex-shrink:0;}
.settings-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.settings-name{font-weight:800;flex:1;font-size:14px;}
.settings-count{font-size:12px;color:var(--ink-soft);font-weight:700;}
.color-swatches{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0;}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.selected{border-color:var(--ink);}

/* STATUS */
.status-card{padding:40px 20px;text-align:center;color:var(--ink-soft);font-size:14px;font-weight:700;border:1.5px dashed var(--border);border-radius:var(--r);background:var(--card);}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
.error-card{background:var(--orange-soft);border:1px solid #E8C0AA;border-radius:var(--r);padding:14px 18px;font-size:14px;font-weight:700;color:var(--orange);}

/* PRINT */
.print-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
@media print{
  .pp-header,.pp-tabs,.toolbar,.form-card,.g-quick-add,.modal-overlay{display:none!important;}
  .pp-content{padding:0!important;}
  .g-row{box-shadow:none!important;}
}

/* HOME DASHBOARD */
.home-greeting{background:linear-gradient(135deg,var(--header) 0%,#2C4A28 100%);border-radius:var(--r);padding:24px 26px;color:#fff;margin-bottom:22px;box-shadow:var(--shadow);}
.home-greeting-name{font-family:'Bitter',Georgia,serif;font-size:22px;font-weight:700;margin-bottom:3px;}
.home-greeting-date{font-size:13px;color:rgba(255,255,255,.65);font-weight:700;}
.home-section-title{font-family:'Bitter',Georgia,serif;font-size:18px;font-weight:700;margin-bottom:12px;}
.today-menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.today-meal-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:5px;transition:border-color .15s,box-shadow .15s;}
.today-meal-card.has-meal{cursor:pointer;}
.today-meal-card.has-meal:hover{border-color:var(--green);box-shadow:var(--shadow);}
.today-meal-slot-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);}
.today-meal-name{font-family:'Bitter',Georgia,serif;font-size:15px;font-weight:700;flex:1;line-height:1.3;}
.today-meal-avail{font-size:11px;font-weight:700;}
.today-meal-empty{font-size:13px;color:var(--ink-soft);font-weight:600;flex:1;}
.today-cook-btn{margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:800;cursor:pointer;width:100%;}
.today-plan-btn{margin-top:6px;display:flex;align-items:center;justify-content:center;gap:5px;background:none;color:var(--ink-soft);border:1.5px dashed var(--border);border-radius:8px;padding:8px;font-size:12px;font-weight:800;cursor:pointer;width:100%;}
.alerts-grid{display:flex;flex-direction:column;gap:10px;}

.alert-card.use-today{border-left-color:var(--rust,var(--orange));}
.alert-card.expiring{border-left-color:var(--orange);}
.alert-card.low-stock{border-left-color:var(--gold);}
.alert-card-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.alert-card.use-today .alert-card-label{color:var(--orange);}
.alert-card.expiring .alert-card-label{color:var(--orange);}

/* COOKING MODAL */
.cooking-overlay{position:fixed;inset:0;background:rgba(17,24,16,.65);z-index:600;display:flex;align-items:flex-end;justify-content:center;}
.cooking-sheet{background:var(--card);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:640px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 -4px 32px rgba(17,24,16,.2);}
.cooking-header{padding:20px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cooking-slot-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:3px;}
.cooking-title{font-family:'Bitter',Georgia,serif;font-size:22px;font-weight:700;margin-bottom:3px;}
.cooking-meta-row{font-size:13px;color:var(--ink-soft);font-weight:700;display:flex;gap:14px;flex-wrap:wrap;}
.cooking-body{padding:18px 22px;flex:1;overflow-y:auto;}
.cooking-section-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin:18px 0 9px;}

.cook-check.have{border-color:var(--green);color:var(--green);}
.cook-check.done{background:var(--green);border-color:var(--green);color:#fff;}

.cook-ing-qty{font-size:12px;color:var(--ink-soft);font-weight:700;}
.cook-step{display:flex;gap:13px;padding:10px 0;border-bottom:1px dashed var(--border);font-size:14px;line-height:1.55;}
.cook-step:last-child{border-bottom:none;}
.cook-step-num{font-family:'JetBrains Mono';font-size:13px;font-weight:700;color:var(--green);flex-shrink:0;width:22px;padding-top:1px;}
.cooking-empty-state{text-align:center;padding:20px 0 24px;}
.cooking-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;}
@media(max-width:480px){
  .pp-content{padding:14px 14px 80px;}
  .planner-slots{grid-template-columns:1fr;}

  .recipe-grid{grid-template-columns:1fr;}
  .today-menu-grid{grid-template-columns:1fr;}
  .cooking-sheet{max-height:95vh;}
  .browser-grid{grid-template-columns:1fr;}
}

<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="cooking-modal-root"></div>
<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────
const LOCATIONS = ['Fridge','Freezer','Pantry','Counter'];
const MEAL_TYPES_FILTER = ['Any','Breakfast','Lunch','Dinner','Snack'];
const CUISINES = ['Any','Italian','Mexican','Indian','Chinese','Japanese','Thai','Vietnamese','Korean','Mediterranean','Middle Eastern','French','American','Greek','Spanish','Other'];
const MEAL_SLOTS = ['Breakfast','Lunch','Dinner'];
const SWATCH_COLORS = ['#4F7042','#C2941F','#A23E1C','#8B6914','#2E5A6B','#5A3A7A','#7A3A52','#295C52','#5A5A37','#8C4E14','#6B7160','#3A6E32'];
const AVATAR_COLORS = ['#4A7C3E','#C4693A','#2E5A6B','#7A3A52','#C2941F','#5A3A7A'];
const UNIT_LIST = ['pcs','g','kg','oz','lb','ml','l','cups','tbsp','tsp','cans','jars','boxes','bags','bunches','cloves'];
const TIME_OPTIONS = [{v:'any',l:'Any time'},{v:'15',l:'≤15 min'},{v:'30',l:'≤30 min'},{v:'45',l:'≤45 min'},{v:'60',l:'≤1 hour'},{v:'90',l:'≤90 min'}];

const DEFAULT_CATEGORIES = [
  {id:'produce',name:'Produce',emoji:'🥦',color:'#4F7042',bg:'#DCE8CE'},
  {id:'dairy',name:'Dairy & Eggs',emoji:'🥛',color:'#C2941F',bg:'#FCEFC7'},
  {id:'meat',name:'Meat & Seafood',emoji:'🥩',color:'#A23E1C',bg:'#F0D6C9'},
  {id:'grains',name:'Grains & Bread',emoji:'🍞',color:'#8B6914',bg:'#EDE0C0'},
  {id:'pantry',name:'Pantry & Dry Goods',emoji:'🫙',color:'#7A5C10',bg:'#E9D9A8'},
  {id:'canned',name:'Canned & Jarred',emoji:'🥫',color:'#5A5A37',bg:'#DCD9BD'},
  {id:'condiments',name:'Condiments & Sauces',emoji:'🫒',color:'#7A3A52',bg:'#E8D3DA'},
  {id:'spices',name:'Spices & Seasonings',emoji:'🧂',color:'#8C4E14',bg:'#F3D9BF'},
  {id:'frozen',name:'Frozen',emoji:'🧊',color:'#2E5A6B',bg:'#D7E6EC'},
  {id:'snacks',name:'Snacks',emoji:'🍿',color:'#5A3A7A',bg:'#E6D7EE'},
  {id:'beverages',name:'Beverages',emoji:'🧃',color:'#295C52',bg:'#CFE6E2'},
  {id:'other',name:'Other',emoji:'📦',color:'#6B7160',bg:'#E2DCCB'}
];

const CAT_KEYWORDS = {
  'Produce':['apple','banana','orange','lemon','lime','grape','berry','strawberry','blueberry','raspberry','melon','watermelon','mango','pear','peach','plum','kiwi','avocado','tomato','potato','onion','garlic','carrot','celery','broccoli','cauliflower','spinach','lettuce','kale','cabbage','cucumber','bell pepper','pepper','zucchini','squash','mushroom','basil','cilantro','parsley','ginger','green onion','scallion','asparagus','corn','beet','radish','herb'],
  'Dairy & Eggs':['milk','cheese','yogurt','yoghurt','butter','cream cheese','sour cream','cottage cheese','mozzarella','cheddar','parmesan','egg','eggs','half and half','buttermilk','cream','brie','feta'],
  'Meat & Seafood':['chicken','beef','pork','turkey','lamb','bacon','sausage','ham','steak','ground beef','mince','fish','salmon','tuna','shrimp','prawn','crab','lobster','cod','tilapia','meat','deli'],
  'Grains & Bread':['bread','bagel','tortilla','pasta','noodle','rice','oats','oatmeal','cereal','flour','bun','roll','pita','naan','muffin','baguette','quinoa','couscous','barley'],
  'Snacks':['chips','crackers','popcorn','pretzel','granola bar','cookie','candy','chocolate bar','trail mix','nuts mix'],
  'Beverages':['juice','soda','pop','sparkling water','coffee','tea','beer','wine','kombucha','energy drink','lemonade','coconut water'],
  'Condiments & Sauces':['ketchup','mustard','mayo','mayonnaise','soy sauce','hot sauce','bbq sauce','ranch','dressing','sriracha','teriyaki','worcestershire','hoisin'],
  'Spices & Seasonings':['cinnamon','cumin','paprika','oregano','thyme','chili powder','curry powder','nutmeg','vanilla extract','bay leaf','black pepper','peppercorn','salt','seasoning','spice'],
  'Canned & Jarred':['canned','can of','jarred','salsa','pickle','pickles','olives','broth','stock','tinned','sauce in jar'],
  'Pantry & Dry Goods':['sugar','baking powder','baking soda','yeast','lentil','beans','chickpea','peanut','almond','cashew','walnut','honey','syrup','olive oil','vegetable oil','vinegar','breadcrumbs','panko'],
  'Frozen':['frozen','ice cream','popsicle','frost']
};

// ─── STORAGE ─────────────────────────────────────────────────────────────
function lsGet(k,def){try{const v=localStorage.getItem('pp_'+k);return v===null?def:JSON.parse(v);}catch{return def;}}
function lsSave(k,v){try{localStorage.setItem('pp_'+k,JSON.stringify(v));}catch(e){console.error('save failed',e);}}

function defaultSettings(){
  return {householdName:'Tiana & Baltej',members:['T','B'],categories:DEFAULT_CATEGORIES.map(c=>({...c})),stores:[],cuisines:['Italian','Mexican','Indian','Chinese','Japanese','Thai','Korean','Mediterranean','French','American','Greek','Other']};
}

let state={
  inventory:[],grocery:[],cookbook:[],planner:{},settings:{}
};

function loadState(){
  state.inventory = lsGet('inventory',[]);
  state.grocery   = lsGet('grocery',[]);
  state.cookbook  = lsGet('cookbook',[]);
  state.planner   = lsGet('planner',{});
  state.settings  = lsGet('settings', defaultSettings());
  // back-fill any missing settings keys
  if(!state.settings.categories) state.settings.categories = DEFAULT_CATEGORIES.map(c=>({...c}));
  if(!state.settings.stores)     state.settings.stores = [];
  if(!state.settings.cuisines)   state.settings.cuisines = defaultSettings().cuisines;
  if(!state.settings.members)    state.settings.members = ['T','B'];
  // pre-seed cookbook on first install
  if(state.cookbook.length===0){
    state.cookbook = SEED_RECIPES.map(r=>({...r}));
    saveCookbook();
  }
}
function saveInv(){lsSave('inventory',state.inventory);}
function saveGrocery(){lsSave('grocery',state.grocery);}
function saveCookbook(){lsSave('cookbook',state.cookbook);}
function savePlanner(){lsSave('planner',state.planner);}
function saveSettings(){lsSave('settings',state.settings);}

// ─── UI STATE ─────────────────────────────────────────────────────────────
let ui={
  tab:'home',
  // cooking mode
  cookingModal:null, // {date,slot,meal,checklist:{},generating:false,generatedRecipe:null,error:''}
  // kitchen
  kitchenSearch:'', kitchenLoc:'All', kitchenCat:'All', kitchenExpiry:'all',
  showAddItem:false, editingItemId:null,
  // grocery
  grocerySearch:'', groceryGroup:'category', groceryStore:'All', showChecked:false,
  showAddGrocery:false, groceryQuickCat:'Other', groceryQuickCatBg:'#E2DCCB', groceryQuickCatColor:'#6B7160', groceryQuickEmoji:'📦',
  // cook
  cookFilters:{mealType:'Any',cuisine:'Any',customCuisine:'',maxTime:'any',preferHave:false,notes:''},
  recipeStatus:'idle', recipes:[], recipeError:'',
  // cookbook
  cbSearch:'', cbMealFilter:'All', cbCanMake:false, showAddCookbook:false, expandedCbId:null,
  // planner
  plannerWeekOffset:0, plannerModal:null, // {date,slot}
  plannerSearch:'', plannerShowCreate:false, plannerMealFilter:'All',
  // recipe browser (within planner tab)
  browserSearch:'', browserMealFilter:'All', browserPlanTitle:null,
  browserShowAddForm:false, generatingRandom:false, generateError:'',
  // settings
  settingsSection:'categories', editCatId:null, showAddCat:false,
  newCatName:'', newCatEmoji:'🍽', newCatColor:'#4F7042',
  editCatName:'', editCatEmoji:'', editCatColor:'',
  newStore:'', newCuisine:'', householdEdit:''
};

// ─── UTILS ────────────────────────────────────────────────────────────────
function uid(){return crypto.randomUUID? crypto.randomUUID():'id-'+Date.now()+'-'+Math.random().toString(36).slice(2);}
function h(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function isLow(item){return Number(item.quantity)<=Number(item.threshold);}
function getCat(name){
  return state.settings.categories.find(c=>c.name===name)||state.settings.categories.find(c=>c.id==='other')||DEFAULT_CATEGORIES[DEFAULT_CATEGORIES.length-1];
}
function guessCategory(name){
  const n=(name||'').toLowerCase();
  if(!n.trim()) return 'Other';
  for(const cat of Object.keys(CAT_KEYWORDS)){if(CAT_KEYWORDS[cat].some(w=>n.includes(w))) return cat;}
  return 'Other';
}
function expiryLabel(dateStr){
  if(!dateStr) return '';
  const d=new Date(dateStr+'T00:00:00');
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((d-today)/86400000);
  if(diff<0) return '⚠ expired';
  if(diff===0) return '⏰ expires today';
  if(diff===1) return '⏰ tomorrow';
  if(diff<=5) return '⏰ '+diff+'d left';
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function isExpiring(item){
  if(!item.expiresOn) return false;
  const d=new Date(item.expiresOn+'T00:00:00');
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((d-today)/86400000);
  return diff<=3;
}
function getWeekStart(offset){
  const d=new Date(); d.setHours(0,0,0,0);
  const day=d.getDay(); const monday=day===0?-6:1-day;
  d.setDate(d.getDate()+monday+offset*7);
  return d;
}
function dateKey(d){return d.toISOString().slice(0,10);}
function avatarColor(letter){const i=letter.charCodeAt(0)%AVATAR_COLORS.length;return AVATAR_COLORS[i];}

// ─── ACTIONS: INVENTORY ───────────────────────────────────────────────────
function addOrUpdateItem(fd){
  const name=(fd.get('name')||'').trim(); if(!name) return;
  const item={id:ui.editingItemId||uid(),name,
    category:fd.get('category'),location:fd.get('location'),
    quantity:parseFloat(fd.get('quantity'))||0,unit:(fd.get('unit')||'').trim(),
    threshold:parseFloat(fd.get('threshold'))||0,expiresOn:fd.get('expiresOn')||''};
  if(ui.editingItemId){const i=state.inventory.findIndex(x=>x.id===ui.editingItemId);if(i>-1)state.inventory[i]=item;}
  else state.inventory.push(item);
  ui.showAddItem=false;ui.editingItemId=null;saveInv();render();
}
function deleteItem(id){state.inventory=state.inventory.filter(i=>i.id!==id);saveInv();render();}
function adjustQty(id,delta){
  const item=state.inventory.find(i=>i.id===id);if(!item)return;
  item.quantity=Math.max(0,(Number(item.quantity)||0)+delta);saveInv();render();
}

// ─── ACTIONS: GROCERY ─────────────────────────────────────────────────────
function addGroceryItem(name,category,note,fromLowStock,quantity,store){
  if(!name.trim()) return false;
  const dup=state.grocery.some(g=>!g.checked&&g.name.toLowerCase()===name.toLowerCase());
  if(dup) return false;
  state.grocery.push({id:uid(),name:name.trim(),category:category||'Other',note:note||'',
    checked:false,fromLowStock:!!fromLowStock,quantity:quantity||'',store:store||''});
  saveGrocery();return true;
}
function toggleChecked(id){const g=state.grocery.find(x=>x.id===id);if(g){g.checked=!g.checked;saveGrocery();render();}}
function deleteGrocery(id){state.grocery=state.grocery.filter(g=>g.id!==id);saveGrocery();render();}
function clearChecked(){state.grocery=state.grocery.filter(g=>!g.checked);saveGrocery();render();}
function addAllLowStock(){
  // Add both use-soon (expiring) and low-stock items to the grocery list
  const toAdd=[...state.inventory.filter(isExpiring),...state.inventory.filter(i=>isLow(i)&&!isExpiring(i))];
  let added=0;
  toAdd.forEach(i=>{ if(addGroceryItem(i.name,i.category,'',true)) added++; });
  saveGrocery();
  ui.tab='grocery';
  render();
}
function updateGroceryField(id,field,value){const g=state.grocery.find(x=>x.id===id);if(g){g[field]=value;saveGrocery();}}

// ─── ACTIONS: COOKBOOK ────────────────────────────────────────────────────
function saveRecipe(recipe){
  const dup=state.cookbook.some(r=>r.title.toLowerCase()===recipe.title.toLowerCase());
  if(!dup){state.cookbook.unshift({...recipe,id:uid(),dateAdded:new Date().toISOString()});saveCookbook();}
}
function deleteCookbookItem(id){state.cookbook=state.cookbook.filter(r=>r.id!==id);saveCookbook();render();}
function addManualRecipe(fd){
  const title=(fd.get('title')||'').trim(); if(!title) return;
  const ingredients=(fd.get('ingredients')||'').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>({name:l,quantity:'',have:false}));
  const steps=(fd.get('steps')||'').split('\n').map(l=>l.trim()).filter(Boolean);
  const recipe={id:uid(),title,cuisine:fd.get('cuisine'),mealType:fd.get('mealType'),
    totalTimeMinutes:parseInt(fd.get('time'))||0,servings:parseInt(fd.get('servings'))||4,
    ingredients,steps,missingIngredients:[],usesLowStock:[],tags:[],dateAdded:new Date().toISOString()};
  state.cookbook.unshift(recipe);saveCookbook();ui.showAddCookbook=false;render();
}
function addMissingToGrocery(idx){
  const r=ui.recipes[idx];if(!r)return;
  (r.missingIngredients||[]).forEach(n=>addGroceryItem(n,'Other','',false));saveGrocery();render();
}

// ─── ACTIONS: PLANNER ─────────────────────────────────────────────────────
function getPlannerDay(dateStr){return state.planner[dateStr]||(state.planner[dateStr]={breakfast:'',lunch:'',dinner:''});}
function setPlannerMeal(dateStr,slot,title){
  getPlannerDay(dateStr)[slot.toLowerCase()]=title;savePlanner();ui.plannerModal=null;render();
}
function clearPlannerMeal(dateStr,slot){
  getPlannerDay(dateStr)[slot.toLowerCase()]='';savePlanner();render();
}
function addWeekMissingToGrocery(){
  const ws=getWeekStart(ui.plannerWeekOffset);
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);
    const key=dateKey(d);const day=state.planner[key];if(!day)continue;
    MEAL_SLOTS.forEach(slot=>{
      const mealTitle=day[slot.toLowerCase()];if(!mealTitle)return;
      const cbRecipe=state.cookbook.find(r=>r.title.toLowerCase()===mealTitle.toLowerCase());
      if(cbRecipe)(cbRecipe.missingIngredients||[]).forEach(n=>addGroceryItem(n,'Other','',false));
    });
  }
  saveGrocery();render();ui.tab='grocery';render();
}

// ─── ACTIONS: SETTINGS ────────────────────────────────────────────────────
function addCategory(){
  const name=ui.newCatName.trim();if(!name)return;
  state.settings.categories.push({id:uid(),name,emoji:ui.newCatEmoji,color:ui.newCatColor,
    bg:ui.newCatColor+'22'});
  saveSettings();ui.showAddCat=false;ui.newCatName='';ui.newCatEmoji='🍽';render();
}
function saveEditCat(){
  const cat=state.settings.categories.find(c=>c.id===ui.editCatId);if(!cat)return;
  cat.name=ui.editCatName;cat.emoji=ui.editCatEmoji;cat.color=ui.editCatColor;cat.bg=ui.editCatColor+'22';
  saveSettings();ui.editCatId=null;render();
}
function deleteCategory(id){
  state.settings.categories=state.settings.categories.filter(c=>c.id!==id);saveSettings();render();
}
function addStore(){const s=ui.newStore.trim();if(s&&!state.settings.stores.includes(s)){state.settings.stores.push(s);saveSettings();ui.newStore='';render();}}
function removeStore(s){state.settings.stores=state.settings.stores.filter(x=>x!==s);saveSettings();render();}
function addCuisine(){const c=ui.newCuisine.trim();if(c&&!state.settings.cuisines.includes(c)){state.settings.cuisines.push(c);saveSettings();ui.newCuisine='';render();}}
function removeCuisine(c){state.settings.cuisines=state.settings.cuisines.filter(x=>x!==c);saveSettings();render();}
function saveHousehold(){state.settings.householdName=ui.householdEdit.trim()||state.settings.householdName;saveSettings();render();}

// ─── KNOWN STORES ─────────────────────────────────────────────────────────
function knownStores(){
  const fromGrocery=[...new Set(state.grocery.map(g=>(g.store||'').trim()).filter(Boolean))];
  const fromSettings=state.settings.stores||[];
  return [...new Set([...fromSettings,...fromGrocery])].sort();
}

  {"title": "Classic French Toast", "cuisine": "American", "mealType": "Breakfast", "totalTimeMinutes": 15, "servings": 2, "description": "Thick-cut bread soaked in egg custard and pan-fried golden.", "spiceLevel": "Mild", "ingredients": [{"name": "Bread", "quantity": "4 slices"}, {"name": "Eggs", "quantity": "2"}, {"name": "Milk", "quantity": "1/4 cup"}, {"name": "Butter", "quantity": "2 tbsp"}, {"name": "Cinnamon", "quantity": "1/2 tsp"}, {"name": "Vanilla extract", "quantity": "1 tsp"}], "steps": ["Whisk eggs, milk, cinnamon and vanilla together.", "Dip bread slices in egg mixture, coating both sides.", "Melt butter in pan over medium heat.", "Cook bread 2\u20133 min per side until golden.", "Serve with maple syrup."], "id": "seed-1", "missingIngredients": [], "usesLowStock": [], "tags": [], "dateAdded": "2025-01-01T00:00:00.000Z"},

const ALWAYS_HAVE=['salt','pepper','water','oil','olive oil','vegetable oil','cooking oil','baking soda','baking powder','sugar'];
function invFuzzyMatch(name){
  const n=(name||'').toLowerCase().trim();
  if(!n) return false;
  if(ALWAYS_HAVE.some(s=>n===s||n.includes(s))) return true;
  return state.inventory.some(item=>{
    if(isLow(item)) return false;
    const iName=item.name.toLowerCase();
    return iName.includes(n)||n.includes(iName)||
      n.split(/\s+/).filter(w=>w.length>3).some(w=>iName.includes(w));
  });
}
function recipeAvailability(recipe){
  const ings=recipe.ingredients||[];
  if(!ings.length) return null;
  const items=ings.map(i=>{
    const name=i.name||String(i);
    const have=typeof i.have==='boolean'?i.have:invFuzzyMatch(name);
    return {name,quantity:i.quantity||'',have};
  });
  const haveCount=items.filter(i=>i.have).length;
  const missingItems=items.filter(i=>!i.have);
  return {have:haveCount,missing:missingItems.length,total:items.length,items,missingItems};
}
function addCookbookMissingToGrocery(id){
  const recipe=state.cookbook.find(r=>r.id===id);
  if(!recipe) return;
  const avail=recipeAvailability(recipe);
  if(!avail||!avail.missingItems.length){alert('All ingredients are already in your kitchen!');return;}
  avail.missingItems.forEach(i=>addGroceryItem(i.name,guessCategory(i.name),'',false,i.quantity||''));
  saveGrocery();render();ui.tab='grocery';render();
}

function renderAlertStrip(){
  const expiring=state.inventory.filter(isExpiring);
  const low=state.inventory.filter(i=>isLow(i)&&!isExpiring(i));
  if(expiring.length===0&&low.length===0) return '';
  const hasAny=expiring.length+low.length>0;
  let parts=[];
  if(expiring.length>0){
    const names=expiring.slice(0,4).map(i=>{
      const d=new Date(i.expiresOn+'T00:00:00'),today=new Date();today.setHours(0,0,0,0);
      const diff=Math.round((d-today)/86400000);
      return h(i.name)+(diff<=0?'':' ('+diff+'d)');
    }).join(' · ')+(expiring.length>4?'…':'');
    parts.push('<span class="alert-badge expiring">🔔 USE SOON</span><span class="alert-text">'+names+'</span>');
  }
  if(low.length>0){
    const names=low.slice(0,4).map(i=>h(i.name)).join(' · ')+(low.length>4?'…':'');
    parts.push('<span class="alert-badge low">📉 LOW STOCK</span><span class="alert-text">'+names+'</span>');
  }
  return '<div class="alert-strip">'+
    parts.join('')+
    (hasAny?'<button class="alert-add-btn" data-action="add-all-low-stock">→ Add to grocery</button>':'')+
  '</div>';
}

function renderGroceryByCategory(items){
  const cats=state.settings.categories;
  return cats.map(cat=>{
    const inCat=items.filter(g=>g.category===cat.name).sort((a,b)=>a.name.localeCompare(b.name));
    if(!inCat.length) return '';
    return '<div class="g-section">'+
      '<div class="shelf-header"><span class="shelf-tag" style="background:'+cat.bg+';color:'+cat.color+';">'+cat.emoji+' '+h(cat.name)+'</span><span class="shelf-count">'+inCat.length+'</span></div>'+
      inCat.map(g=>renderGroceryRow(g)).join('')+
    '</div>';
  }).join('')+
  renderUncategorizedGrocery(items,cats.map(c=>c.name));
}
function renderUncategorizedGrocery(items,knownCats){
  const unk=items.filter(g=>!knownCats.includes(g.category)).sort((a,b)=>a.name.localeCompare(b.name));
  if(!unk.length) return '';
  return '<div class="g-section"><div class="shelf-header"><span class="shelf-tag" style="background:#E2DCCB;color:#6B7160;">📦 Other</span></div>'+unk.map(g=>renderGroceryRow(g)).join('')+'</div>';
}
function renderGroceryByStore(items){
  const storeOf=g=>(g.store||'').trim()||'No store';
  const stores=[...new Set(items.map(storeOf))].sort((a,b)=>{
    if(a==='No store') return 1; if(b==='No store') return -1; return a.localeCompare(b);
  });
  return stores.map(store=>{
    const inStore=items.filter(g=>storeOf(g)===store).sort((a,b)=>a.name.localeCompare(b.name));
    return '<div class="g-section">'+
      '<div class="shelf-header"><span class="shelf-tag" style="background:var(--border);color:var(--ink);">'+h(store)+'</span><span class="shelf-count">'+inStore.length+'</span></div>'+
      inStore.map(g=>renderGroceryRow(g)).join('')+
    '</div>';
  }).join('');
}
function renderGroceryRow(g){
  const cat=getCat(g.category);
  const catOptions=state.settings.categories.map(c=>
    '<option value="'+h(c.name)+'" '+(c.name===g.category?'selected':'')+'>'+c.emoji+' '+h(c.name)+'</option>'
  ).join('');
  return '<div class="g-row '+(g.checked?'done':'')+'" style="border-left-color:'+cat.color+';" id="grow-'+g.id+'">'+
    '<button class="check-circle '+(g.checked?'checked':'')+'" data-action="toggle-checked" data-id="'+g.id+'">'+
      (g.checked?'✓':'')+'</button>'+
    '<div class="g-main">'+
      '<div class="g-name">'+h(g.name)+(g.fromLowStock?'<span class="low-tag">low</span>':'')+'</div>'+
      '<div class="g-fields">'+
        '<input class="g-input g-qty" value="'+h(g.quantity||'')+'" placeholder="qty" list="unit-dl"'+
          ' data-change="g-qty" data-id="'+g.id+'">'+
        '<input class="g-input g-store" value="'+h(g.store||'')+'" placeholder="store" list="store-dl"'+
          ' data-change="g-store" data-id="'+g.id+'">'+
      '</div>'+
      (g.note?'<div class="g-note">'+h(g.note)+'</div>':'')+
      '<select class="cat-select" data-change="g-cat" data-id="'+g.id+'" '+
        'style="background:'+cat.bg+';color:'+cat.color+';">'+
        catOptions+
      '</select>'+
    '</div>'+
    '<button class="btn-icon" data-action="delete-grocery" data-id="'+g.id+'">✕</button>'+
  '</div>';
}
function renderGroceryForm(){
  const catOptions=state.settings.categories.map(c=>'<option value="'+h(c.name)+'">'+c.emoji+' '+h(c.name)+'</option>').join('');
  return '<form class="form-card" data-form="add-grocery">'+
    '<div class="form-grid">'+
      '<div class="field"><label>Item name</label><input name="name" required placeholder="e.g. Olive oil"></div>'+
      '<div class="field"><label>Category</label><select name="category">'+catOptions+'</select></div>'+
      '<div class="field"><label>Quantity</label><input name="quantity" placeholder="e.g. 2 bags"></div>'+
      '<div class="field"><label>Store</label><input name="store" list="store-dl" placeholder="e.g. Costco"></div>'+
      '<div class="field"><label>Note</label><input name="note" placeholder="brand, size…"></div>'+
    '</div>'+
    '<div class="form-actions">'+
      '<button type="submit" class="btn btn-primary">Add to list</button>'+
      '<button type="button" class="btn btn-secondary" data-action="close-add-grocery">Cancel</button>'+
    '</div>'+
  '</form>';
}

// ─── RENDER: COOK ─────────────────────────────────────────────────────────
function renderCook(){
  const f=ui.cookFilters;
  const cuisineList=['Any',...state.settings.cuisines,'Other'];
  const cuisineOpts=cuisineList.map(c=>'<option value="'+h(c)+'" '+(c===f.cuisine?'selected':'')+'>'+h(c)+'</option>').join('');
  const mealOpts=MEAL_TYPES_FILTER.map(m=>'<option value="'+h(m)+'" '+(m===f.mealType?'selected':'')+'>'+h(m)+'</option>').join('');
  const timeOpts=TIME_OPTIONS.map(t=>'<option value="'+t.v+'" '+(t.v===f.maxTime?'selected':'')+'>'+h(t.l)+'</option>').join('');

  const filtersHtml='<div class="filters-card">'+
    '<div class="filter-row">'+
      '<div class="filter-field"><label>Meal type</label><select data-change="cook-meal">'+mealOpts+'</select></div>'+
      '<div class="filter-field"><label>Cuisine</label><select data-change="cook-cuisine">'+cuisineOpts+'</select></div>'+
      (f.cuisine==='Other'?'<div class="filter-field"><label>Which cuisine?</label><input id="cook-custom-cuisine" value="'+h(f.customCuisine)+'" placeholder="e.g. Ethiopian"></div>':'')+
      '<div class="filter-field"><label>Max time</label><select data-change="cook-time">'+timeOpts+'</select></div>'+
      '<div class="filter-field" style="flex:2;"><label>Notes</label><input id="cook-notes" value="'+h(f.notes)+'" placeholder="allergies, cravings, dietary…"></div>'+
    '</div>'+
    '<label class="check-option">'+
      '<input type="checkbox" '+(f.preferHave?'checked':'')+' data-change="cook-prefer-have">'+
      'Prioritize using what I already have'+
    '</label>'+
    '<div class="form-actions" style="margin-top:14px;">'+
      '<button class="btn btn-primary" data-action="find-recipes">✦ Find recipes</button>'+
      '<button class="btn btn-secondary" data-action="use-what-i-have">Use what I have, right now</button>'+
    '</div>'+
  '</div>';

  let results='';
  if(ui.recipeStatus==='idle') results='<div class="status-card">Set your filters and find something to make.</div>';
  else if(ui.recipeStatus==='loading') results='<div class="status-card"><div class="spinner"></div>Thinking up recipes…</div>';
  else if(ui.recipeStatus==='error') results='<div class="error-card">'+h(ui.recipeError)+'</div>';
  else if(ui.recipeStatus==='done')  results=renderRecipeResults();

  return filtersHtml+results+

      renderCookbook()+

}

function renderRecipeResults(){
  if(!ui.recipes.length) return '<div class="status-card">No recipes found. Try loosening a filter.</div>';
  return '<div class="recipe-grid">'+ui.recipes.map((r,idx)=>renderRecipeCard(r,idx)).join('')+'</div>';
}

function renderRecipeCard(r,idx){
  const missing=r.missingIngredients||[];
  const usesLow=r.usesLowStock||[];
  const ings=(r.ingredients||[]).map(ing=>
    '<li><span class="'+(ing.have?'ing-have':'ing-miss')+'">'+(ing.have?'✓':'·')+'</span> '+h(ing.name)+(ing.quantity?' — '+h(ing.quantity):'')+'</li>'
  ).join('');
  const steps=(r.steps||[]).map(s=>'<li>'+h(s)+'</li>').join('');
  const isSaved=state.cookbook.some(cb=>cb.title.toLowerCase()===r.title.toLowerCase());
  return '<div class="recipe-card">'+
    '<h3>'+h(r.title||'Untitled')+'</h3>'+
    '<div class="recipe-badges">'+
      (r.cuisine?'<span class="badge badge-cuisine">'+h(r.cuisine)+'</span>':'')+
      (r.mealType?'<span class="badge badge-meal">'+h(r.mealType)+'</span>':'')+
    '</div>'+
    '<div class="recipe-meta"><span>⏱ '+(r.totalTimeMinutes??'?')+' min</span><span>👤 '+h(r.servings??'?')+'</span></div>'+
    (usesLow.length?'<div class="uses-low">Uses up: '+usesLow.map(h).join(', ')+'</div>':'')+
    '<ul class="ing-list">'+ings+'</ul>'+
    '<ol class="recipe-steps">'+steps+'</ol>'+
    '<div class="recipe-actions">'+
      (missing.length?'<button class="btn btn-secondary" data-action="add-missing-grocery" data-idx="'+idx+'">+ '+missing.length+' to list</button>':'')+
      (isSaved
        ?'<button class="btn btn-secondary" disabled>✓ Saved</button>'
        :'<button class="btn btn-secondary" data-action="save-recipe" data-idx="'+idx+'">🔖 Save</button>')+
    '</div>'+
  '</div>';
}

// ─── RENDER: COOKBOOK ─────────────────────────────────────────────────────
function cookbookFiltered(){
  let books=state.cookbook;
  if(ui.cbSearch)          books=books.filter(r=>r.title.toLowerCase().includes(ui.cbSearch.toLowerCase()));
  if(ui.cbMealFilter!=='All') books=books.filter(r=>r.mealType===ui.cbMealFilter);
  if(ui.cbCanMake)         books=books.filter(r=>{ const a=recipeAvailability(r); return !a||a.missing===0; });
  return books;
}
function renderCookbookCards(){
  if(ui.generatingRandom) return '<div class="status-card"><div class="spinner" style="margin:0 auto 12px;"></div>Generating new recipes…</div>';
  if(ui.generateError) return '<div class="error-card" style="margin-bottom:12px;">'+h(ui.generateError)+'</div>'+renderCookbookCardsInner();
  return renderCookbookCardsInner();
}
function renderCookbookCardsInner(){
  const books=cookbookFiltered();
  return books.length===0
    ?'<div class="status-card">'+(state.cookbook.length===0?'No saved recipes yet. Generate some above and hit 🔖 Save, or add one manually below.':'No recipes match your filters.')+'</div>'
    :'<div class="recipe-grid">'+books.map(r=>renderCbCard(r)).join('')+'</div>';
}
function renderCookbook(){
  const total=state.cookbook.length;

    '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:4px;"></span>Ready to cook</span>'+
    '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-right:4px;"></span>Partial match</span>'+

  const statsLine=total>0

      '</div>'

  const canMakeBtn='<button class="pill-btn '+(ui.cbCanMake?'active':'')+'" data-action="toggle-cb-can-make">✅ Can make now</button>';

    '<button class="btn btn-secondary" data-action="open-add-cookbook">+ Add recipe</button>'+
    '<button class="btn btn-primary" data-action="generate-random-recipes" '+(ui.generatingRandom?'disabled':'')+' style="display:flex;align-items:center;gap:5px;">'+
      (ui.generatingRandom?'<span class="spinner" style="width:14px;height:14px;border-width:2px;margin:0;"></span> Generating…':'✦ Generate more')+
    '</button>'+
  '</div>'+
  statsLine+legend+
  '<div class="toolbar" style="margin-bottom:12px;">'+
    '<div class="search-box" style="flex:1;"><span class="search-icon">🔍</span>'+
      '<input id="cb-search-input" data-live="cb-search" value="'+h(ui.cbSearch)+'" placeholder="Search cookbook…">'+
    '</div>'+
  '</div>'+
  '<div class="pill-filters" style="margin-bottom:16px;">'+mealFilterBtns+canMakeBtn+'</div>'+
  (ui.showAddCookbook?renderAddCookbookForm():'')+
  '<div id="cookbook-cards">'+renderCookbookCards()+'</div>';

function renderCbCard(r){
  const expanded=ui.expandedCbId===r.id;
  const avail=recipeAvailability(r);

  // Availability dot color
  let dotColor='var(--border)';
  let dotTitle='No ingredients listed';
  if(avail){
    if(avail.missing===0){dotColor='var(--green)';dotTitle='Ready to cook';}
    else if(avail.have>=avail.total/2){dotColor='var(--gold)';dotTitle='Partial match';}
    else{dotColor='var(--orange)';dotTitle='Need to shop';}
  }
  const dot='<span title="'+dotTitle+'" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+dotColor+';flex-shrink:0;margin-top:4px;"></span>';

  // Availability bar
  let availBar='';
  if(avail){
    const pct=Math.round((avail.have/avail.total)*100);
    const barColor=avail.missing===0?'var(--green)':avail.have>=avail.total/2?'var(--gold)':'var(--orange)';
    const label=avail.missing===0
      ?'<span style="color:var(--green);font-weight:800;">✅ All '+avail.total+' ingredients in kitchen</span>'
      :'<span><strong style="color:'+barColor+';">'+avail.have+'/'+avail.total+'</strong> <span style="color:var(--ink-soft);font-weight:700;">in kitchen</span></span>';
    availBar='<div style="margin:8px 0 6px;">'+label+
      '<div style="height:4px;background:var(--border);border-radius:3px;margin-top:5px;overflow:hidden;">'+
        '<div style="height:100%;width:'+pct+'%;background:'+barColor+';border-radius:3px;"></div>'+
      '</div></div>';
  }

  // Spice badge
  const spiceColor={'Mild':'#4F7042','Medium':'#C2941F','Hot':'#A23E1C','Very Hot':'#7A0000'}[r.spiceLevel]||'var(--ink-soft)';
  const spiceBadge=r.spiceLevel?'<span style="font-size:10px;font-weight:800;color:'+spiceColor+';border:1px solid '+spiceColor+'22;background:'+spiceColor+'11;padding:2px 8px;border-radius:8px;">🌶 '+h(r.spiceLevel)+'</span>':'';

  // Expanded ingredients
  let ingSection='';
  if(expanded&&avail&&avail.items.length){
    ingSection='<div style="margin:10px 0 6px;"><div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);margin-bottom:6px;">Ingredients</div>'+
      '<ul class="ing-list">'+avail.items.map(i=>
        '<li><span class="'+(i.have?'ing-have':'ing-miss')+'">'+(i.have?'✓':'·')+'</span> '+
        h(i.name)+(i.quantity?' <span style="color:var(--ink-soft);font-size:11px;">'+h(i.quantity)+'</span>':'')+
        '</li>').join('')+'</ul></div>';
  } else if(expanded&&r.ingredients&&r.ingredients.length&&!avail){
    ingSection='<div style="margin:10px 0 6px;"><ul class="ing-list">'+r.ingredients.map(i=>'<li>'+h(i.name||i)+(i.quantity?' <span style="color:var(--ink-soft);font-size:11px;">'+h(i.quantity)+'</span>':'')+'</li>').join('')+'</ul></div>';
  }
  const stepsSection=expanded&&r.steps&&r.steps.length
    ?'<div style="margin:6px 0;"><div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);margin-bottom:6px;">Steps</div>'+
      '<ol class="recipe-steps">'+r.steps.map(s=>'<li>'+h(s)+'</li>').join('')+'</ol></div>'
    :'';

  const addMissingBtn=avail&&avail.missing>0
    ?'<button class="btn-icon" data-action="add-cookbook-missing" data-id="'+r.id+'" style="color:var(--green);border-color:var(--green);">🛒 Add '+avail.missing+' missing</button>'
    :'';

  return '<div class="cb-card" style="display:flex;flex-direction:column;">'+
    '<div style="display:flex;gap:8px;">'+dot+
      '<div style="flex:1;min-width:0;">'+
        '<h3 style="margin-bottom:3px;">'+h(r.title)+'</h3>'+
        '<div style="font-size:12px;color:var(--ink-soft);font-weight:700;margin-bottom:6px;">'+
          [r.cuisine,r.mealType].filter(Boolean).map(h).join(' · ')+
        '</div>'+
        (r.description?'<div style="font-size:13px;color:var(--ink-soft);margin-bottom:8px;line-height:1.4;">'+h(r.description)+'</div>':'')+
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'+
          (r.totalTimeMinutes?'<span style="font-size:12px;color:var(--ink-soft);font-weight:700;">⏱ '+r.totalTimeMinutes+' min</span>':'')+
          (r.servings?'<span style="font-size:12px;color:var(--ink-soft);font-weight:700;">👤 '+r.servings+'</span>':'')+
          spiceBadge+
        '</div>'+
        availBar+
      '</div>'+
    '</div>'+
    ingSection+stepsSection+
    '<div class="cb-actions" style="flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">'+
      '<button class="btn-icon" data-action="toggle-cb-expand" data-id="'+r.id+'">'+(expanded?'▲ Less':'▼ View')+'</button>'+
      addMissingBtn+
      '<button class="btn-icon" data-action="plan-from-cookbook" data-title="'+h(r.title)+'" style="color:var(--ink-soft);">📅 Plan</button>'+
      '<button class="btn-icon" data-action="delete-cookbook" data-id="'+r.id+'" style="color:var(--orange);margin-left:auto;">✕</button>'+
    '</div>'+
  '</div>';
}

// ─── RENDER: HOME DASHBOARD ───────────────────────────────────────────────
function greeting(){
  const hr=new Date().getHours();
  if(hr>=5&&hr<12) return 'Good morning';
  if(hr>=12&&hr<17) return 'Good afternoon';
  if(hr>=17&&hr<21) return 'Good evening';
  return 'Good night';
}
function renderHome(){
  const today=new Date();
  const key=dateKey(today);
  const dayData=state.planner[key]||{};
  const dayFull=today.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const name=state.settings.householdName||'';

  const mealCards=MEAL_SLOTS.map(slot=>{
    const meal=dayData[slot.toLowerCase()]||'';
    const emoji=SLOT_EMOJI[slot]||'';
    const cbEntry=meal?state.cookbook.find(r=>r.title.toLowerCase()===meal.toLowerCase()):null;
    const avail=cbEntry?recipeAvailability(cbEntry):null;
    const availText=avail?(avail.missing===0
      ?'<span style="color:var(--green);">✅ Ready to cook</span>'
      :'<span style="color:var(--gold);">'+avail.have+'/'+avail.total+' ingredients in kitchen</span>'):'';
    const cardAttrs=meal?'data-action="open-cooking-mode" data-date="'+key+'" data-slot="'+h(slot)+'" data-meal="'+h(meal)+'"':'';
    return '<div class="today-meal-card '+(meal?'has-meal':'')+'" '+cardAttrs+'>'+
      '<div class="today-meal-slot-label">'+emoji+' '+slot+'</div>'+
      (meal
        ?'<div class="today-meal-name">'+h(meal)+'</div>'+
          (availText?'<div class="today-meal-avail">'+availText+'</div>':'')+
          '<button class="today-cook-btn" data-action="open-cooking-mode" data-date="'+key+'" data-slot="'+h(slot)+'" data-meal="'+h(meal)+'">▶ Cook it</button>'
        :'<div class="today-meal-empty">Nothing planned</div>'+
          '<button class="today-plan-btn" data-action="set-tab" data-tab="planner">+ Plan today</button>')+
    '</div>';
  }).join('');

  const expiring=state.inventory.filter(isExpiring);
  const low=state.inventory.filter(i=>isLow(i)&&!isExpiring(i));
  const useToday=state.inventory.filter(i=>{
    if(!i.expiresOn) return false;
    const d=new Date(i.expiresOn+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);
    return Math.round((d-t)/86400000)<=1;
  });

  const alertCards=[];
  if(useToday.length){
    alertCards.push('<div class="alert-card use-today">'+
      '<div class="alert-card-label">🍽 Use today — don\'t waste it!</div>'+
      '<div class="alert-card-body">'+useToday.map(i=>h(i.name)).join(' · ')+'</div>'+
    '</div>');
  }
  if(expiring.length){
    const names=expiring.filter(i=>!useToday.includes(i)).slice(0,5).map(i=>{
      const d=new Date(i.expiresOn+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);
      const diff=Math.round((d-t)/86400000);
      return h(i.name)+(diff>0?' ('+diff+'d)':'');
    }).join(' · ');
    if(names) alertCards.push('<div class="alert-card expiring">'+
      '<div class="alert-card-label">⏰ Use soon</div>'+
      '<div class="alert-card-body">'+names+'</div>'+
    '</div>');
  }
  if(low.length){
    alertCards.push('<div class="alert-card low-stock">'+
      '<div class="alert-card-label">📉 Running low</div>'+
      '<div class="alert-card-body" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">'+
        '<span>'+low.slice(0,5).map(i=>h(i.name)).join(' · ')+'</span>'+
        '<button class="btn-ghost" data-action="add-all-low-stock" style="font-size:12px;color:var(--green);font-weight:800;padding:0;white-space:nowrap;">→ Add to grocery</button>'+
      '</div>'+
    '</div>');
  }
  if(!alertCards.length){
    alertCards.push('<div class="alert-card" style="border-left-color:var(--green);">'+
      '<div class="alert-card-label" style="color:var(--green);">✅ All good</div>'+
      '<div class="alert-card-body">Your kitchen is stocked and nothing is expiring soon.</div>'+
    '</div>');
  }

  return '<div class="home-greeting">'+
    '<div class="home-greeting-name">'+greeting()+', '+h(name)+'! 👋</div>'+
    '<div class="home-greeting-date">'+dayFull+'</div>'+
  '</div>'+
  '<div style="margin-bottom:24px;">'+
    '<div class="home-section-title">Today\'s menu</div>'+
    '<div class="today-menu-grid">'+mealCards+'</div>'+
  '</div>'+
  '<div>'+
    '<div class="home-section-title">Kitchen alerts</div>'+
    '<div class="alerts-grid">'+alertCards.join('')+'</div>'+
  '</div>';
}

function renderCookingModal(){

  if(!root) return;
  if(!ui.cookingModal){root.innerHTML='';return;}

  const{date,slot,meal,checklist,generating,generatedRecipe,error}=ui.cookingModal;
  const emoji=SLOT_EMOJI[slot]||'';
  const cbRecipe=state.cookbook.find(r=>r.title.toLowerCase()===meal.toLowerCase());
  const recipe=generatedRecipe||cbRecipe;

  let body='',footer='';
  const footerBase=
    '<button class="btn btn-secondary" data-action="change-meal" data-date="'+h(date)+'" data-slot="'+h(slot)+'">Change meal</button>'+
    '<button class="btn btn-secondary" data-action="close-cooking-modal">Done</button>';

    body='<div class="cooking-body" style="text-align:center;padding:40px 22px;">'+
      '<div class="spinner" style="margin:0 auto 16px;"></div>'+

    '</div>';

  } else if(recipe){

    const ings=avail?avail.items:((recipe.ingredients||[]).map(i=>({name:i.name||String(i),quantity:i.quantity||'',have:false})));

    const ingHtml=ings.length?'<div class="cooking-section-label">Ingredients</div>'+
      ings.map(i=>{
        const done=!!(checklist&&checklist[i.name]);
        const cls=done?'done':(i.have?'have':'need');
        const icon=done?'✓':(i.have?'✓':'·');
        return '<div class="cook-ing-row" data-action="toggle-cooking-ingredient" data-name="'+h(i.name)+'">'+
          '<div class="cook-check '+cls+'">'+icon+'</div>'+
          '<span class="cook-ing-text '+(done?'done':'')+'">'+h(i.name)+'</span>'+
          (i.quantity?'<span class="cook-ing-qty">'+h(i.quantity)+'</span>':'')+

      recipe.steps.map((s,idx)=>'<div class="cook-step"><span class="cook-step-num">'+(idx+1)+'</span><span>'+h(s)+'</span></div>').join(''):'';

    body='<div class="cooking-body">'+
      (recipe.description?'<p style="color:var(--ink-soft);font-size:14px;font-weight:600;margin-bottom:2px;line-height:1.5;">'+h(recipe.description)+'</p>':'')+
      ingHtml+stepsHtml+
      (error?'<div class="error-card" style="margin-top:14px;">'+h(error)+'</div>':'')+
    '</div>';

    footer='<div class="cooking-footer">'+footerBase+
      (!cbRecipe&&generatedRecipe?'<button class="btn btn-primary" data-action="save-generated-recipe">🔖 Save to cookbook</button>':'')+
    '</div>';

  } else {
    // Manual entry with no saved recipe
    body='<div class="cooking-body">'+
      '<div class="cooking-empty-state">'+
        '<div style="font-size:52px;margin-bottom:14px;">🍽</div>'+
        '<div style="font-size:15px;font-weight:700;color:var(--ink-soft);margin-bottom:22px;">No saved recipe for "'+h(meal)+'" yet.</div>'+
        '<div style="display:flex;flex-direction:column;gap:10px;max-width:340px;margin:0 auto;">'+
          '<button class="btn btn-secondary" data-action="add-recipe-for-meal" data-date="'+h(date)+'" data-slot="'+h(slot)+'" data-title="'+h(meal)+'" style="padding:14px;font-size:14px;">+ Add recipe details</button>'+
          '<button class="btn btn-primary" data-action="generate-meal-recipe" style="padding:14px;font-size:14px;">✦ Generate recipe with what I have</button>'+
        '</div>'+
      '</div>'+
      (error?'<div class="error-card" style="margin-top:14px;">'+h(error)+'</div>':'')+
    '</div>';
    footer='<div class="cooking-footer">'+footerBase+'</div>';
  }

  root.innerHTML='<div class="cooking-overlay" id="pp-cooking-overlay">'+
    '<div class="cooking-sheet">'+
      '<div class="cooking-header">'+
        '<button class="modal-close" data-action="close-cooking-modal" style="float:right;margin-top:-4px;">×</button>'+
        '<div class="cooking-slot-label">'+emoji+' '+h(slot)+'</div>'+

        (recipe?'<div class="cooking-meta-row">'+
          [recipe.cuisine,recipe.totalTimeMinutes?recipe.totalTimeMinutes+' min':null,recipe.servings?'Serves '+recipe.servings:null,recipe.spiceLevel].filter(Boolean).map(h).join(' · ')+
        '</div>':'')+

    '</div>'+
  '</div>';
}

async function generateRecipeForMeal(){
  const meal=ui.cookingModal.meal;
  ui.cookingModal.generating=true;
  ui.cookingModal.error='';
  renderCookingModal();
  const inventory=state.inventory.map(i=>i.name+(i.quantity?' ('+i.quantity+(i.unit?' '+h(i.unit):'')+')':'')).join(', ');
  const system='You are a recipe generator. Given a meal name and the user\'s kitchen inventory, generate a practical recipe using as many of their available ingredients as possible. Respond ONLY with a raw JSON object (no markdown, no code fences): {"title":string,"cuisine":string,"mealType":string,"totalTimeMinutes":number,"servings":number,"description":string,"spiceLevel":string,"ingredients":[{"name":string,"quantity":string,"have":boolean}],"steps":[string],"missingIngredients":[string],"tags":[string]}. Mark have:true if the ingredient fuzzy-matches the inventory. Assume salt, pepper, oil, and water are always available. Keep steps to 4-6 clear imperative sentences.';
  try{
    const res=await fetch('/.netlify/functions/generate-recipe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({max_tokens:1000,system,messages:[{role:'user',content:'Generate a recipe for: "'+meal+'"\n\nKitchen inventory: '+inventory}]})});
    const data=await res.json();
    let text=(data.content||[]).find(b=>b.type==='text')?.text||'';
    text=text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const recipe=JSON.parse(text);
    if(!recipe.title) throw new Error('empty');
    ui.cookingModal.generatedRecipe={...recipe,id:uid(),dateAdded:new Date().toISOString(),usesLowStock:[]};
    ui.cookingModal.generating=false;
  }catch(e){
    console.error(e);
    ui.cookingModal.generating=false;
    ui.cookingModal.error='Couldn\'t generate a recipe right now. Try again.';
  }
  renderCookingModal();
}


const SLOT_EMOJI={'Breakfast':'🌅','Lunch':'🍳','Dinner':'🌙'};

async function generateRandomRecipes(){
  ui.generatingRandom=true;
  ui.generateError='';
  // Full render FIRST so the button shows disabled + loading state immediately,
  // regardless of which tab is currently showing
  render();

  const existing=state.cookbook.slice(0,40).map(r=>r.title).join(', ');
  const system='You are a creative recipe generator for a home kitchen app. Generate exactly 6 diverse and practical recipes. Mix different cuisines, meal types, and difficulty levels. Avoid duplicating any of these existing recipes: '+existing+'. Respond ONLY with a raw JSON array of 6 recipe objects (no markdown, no fences): [{"title":string,"cuisine":string,"mealType":string,"totalTimeMinutes":number,"servings":number,"description":string,"spiceLevel":string,"ingredients":[{"name":string,"quantity":string,"have":false}],"steps":[string],"missingIngredients":[],"tags":[string]}]. Keep descriptions under 15 words. Keep steps to 4-6 imperative sentences each under 15 words. Include at least one Breakfast, one Lunch, and one Dinner recipe.';
  try{
    const res=await fetch('/.netlify/functions/generate-recipe',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({max_tokens:1000,system,
        messages:[{role:'user',content:'Generate 6 diverse home recipes I haven\'t tried yet.'}]})
    });
    if(!res.ok) throw new Error('API error '+res.status);
    const data=await res.json();
    let text=(data.content||[]).find(b=>b.type==='text')?.text||'';
    text=text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const s=text.indexOf('['),e=text.lastIndexOf(']');
    if(s>-1&&e>-1) text=text.slice(s,e+1);
    const recipes=JSON.parse(text);
    if(!Array.isArray(recipes)||!recipes.length) throw new Error('empty response');
    let added=0;
    recipes.forEach(r=>{
      if(!r.title) return;
      const dup=state.cookbook.some(cb=>cb.title.toLowerCase()===r.title.toLowerCase());
      if(!dup){ state.cookbook.push({...r,id:uid(),dateAdded:new Date().toISOString(),usesLowStock:[]}); added++; }
    });
    saveCookbook();
    ui.generatingRandom=false;
  }catch(err){
    console.error('generateRandomRecipes error:', err);
    ui.generatingRandom=false;
    ui.generateError='Couldn\'t generate recipes right now. Please try again.';
  }
  render();
}

function renderPlanner(){
  const ws=getWeekStart(ui.plannerWeekOffset);
  const we=new Date(ws);we.setDate(we.getDate()+6);
  const label=ws.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' – '+we.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  const today=new Date();today.setHours(0,0,0,0);
  const hasAny=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return state.planner[dateKey(d)];}).some(Boolean);

  const days=Array.from({length:7},(_,i)=>{
    const d=new Date(ws);d.setDate(d.getDate()+i);
    const key=dateKey(d);
    const isToday=d.getTime()===today.getTime();
    const dayData=state.planner[key]||{};
    const dayLabel=d.toLocaleDateString(undefined,{weekday:'long'});
    const dateStr=d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
    const slots=MEAL_SLOTS.map(slot=>{
      const meal=dayData[slot.toLowerCase()]||'';
      const emoji=SLOT_EMOJI[slot]||'';
      // If meal exists, clicking opens cooking mode; if empty, opens recipe picker
      const action=meal?'open-cooking-mode':'open-planner-modal';
      const extraAttrs=meal?' data-meal="'+h(meal)+'"':'';
      // Show a green dot if all ingredients are in kitchen
      const cbEntry=meal?state.cookbook.find(r=>r.title.toLowerCase()===meal.toLowerCase()):null;
      const avail=cbEntry?recipeAvailability(cbEntry):null;
      const dot=avail&&avail.missing===0?'<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle;flex-shrink:0;"></span>':'';
      return '<div class="planner-slot" data-action="'+action+'" data-date="'+key+'" data-slot="'+h(slot)+'"'+extraAttrs+'>'+
        '<div class="slot-label">'+emoji+' '+slot+'</div>'+
        (meal
          ?'<div class="slot-meal" style="display:flex;align-items:baseline;gap:4px;">'+dot+h(meal)+'</div>'

    return '<div class="planner-day">'+
      '<div class="planner-day-header">'+
        '<span class="day-label">'+dayLabel+'</span>'+
        '<span class="day-date">'+dateStr+'</span>'+
        (isToday?'<span class="today-chip">TODAY</span>':'')+
      '</div>'+
      '<div class="planner-slots">'+slots+'</div>'+
    '</div>';
  }).join('');

  // Recipe Browser section
  const mealPills=['All','Breakfast','Lunch','Dinner','Snack'].map(m=>
    '<button class="pill-btn '+(ui.browserMealFilter===m?'active':'')+'" data-action="set-browser-meal" data-val="'+m+'">'+m+'</button>').join('');

  const browser='<div class="recipe-browser-section">'+
    '<div class="recipe-browser-header">'+
      '<h3>📖 Recipe Browser</h3>'+
      '<button class="btn btn-secondary" data-action="toggle-browser-add-form" style="font-size:12px;padding:7px 13px;">+ Add recipe</button>'+
      '<button class="btn btn-primary" data-action="generate-random-recipes" '+(ui.generatingRandom?'disabled':'')+' style="font-size:12px;padding:7px 13px;display:flex;align-items:center;gap:5px;">'+
        (ui.generatingRandom?'<span class="spinner" style="width:14px;height:14px;border-width:2px;margin:0;"></span> Generating…':'✦ Generate recipes')+
      '</button>'+
      '<div class="search-box" style="max-width:240px;"><span class="search-icon">🔍</span>'+
        '<input id="browser-search-input" data-live="browser-search" value="'+h(ui.browserSearch)+'" placeholder="Search recipes…">'+
      '</div>'+
    '</div>'+
    '<div class="pill-filters" style="margin-bottom:14px;">'+mealPills+'</div>'+
    (ui.browserShowAddForm?'<div style="margin-bottom:14px;">'+renderAddCookbookForm()+'</div>':'')+
    '<div id="recipe-browser-list">'+renderRecipeBrowserList()+'</div>'+
  '</div>';

  return '<div class="planner-header">'+
    '<button class="planner-nav" data-action="planner-prev">‹</button>'+
    '<div class="planner-title"><h2>'+label+'</h2><p>Tap any slot to add a meal</p></div>'+
    '<button class="planner-nav" data-action="planner-next">›</button>'+
  '</div>'+
  (hasAny?'<div style="text-align:center;margin-bottom:16px;"><button class="btn btn-secondary" data-action="add-week-missing">🛒 Add week\'s missing to grocery</button></div>':'')+
  '<div class="planner-grid">'+days+'</div>'+

}
